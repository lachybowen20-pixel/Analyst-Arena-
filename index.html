var HL_BANKS={
  val:[
    {q:'Which valuation method typically gives a HIGHER value?',a:'Precedent Transactions',b:'Comparable Companies',correct:'a',explain:'Precedent transactions include a control premium (20-40%) and potential synergies, so they typically yield higher valuations than public market trading multiples.'},
    {q:'Which valuation multiple is MORE commonly used in investment banking?',a:'EV/EBITDA',b:'P/E Ratio',correct:'a',explain:'EV/EBITDA is preferred because it is independent of capital structure differences between companies, unlike P/E which is affected by leverage.'},
    {q:'Which typically receives a HIGHER valuation multiple?',a:'Public company',b:'Private company',correct:'a',explain:'Private companies are typically valued at a 10-15% discount to comparable public companies because public companies enjoy a liquidity premium.'},
    {q:'In a DCF, which typically represents a LARGER portion of total enterprise value?',a:'Terminal value',b:'Projected period cash flows',correct:'a',explain:'Terminal value typically represents 60-75% of the total enterprise value in a DCF analysis.'},
    {q:'Which values a company based on what acquirers have ACTUALLY paid?',a:'Precedent Transactions',b:'DCF Analysis',correct:'a',explain:'Precedent transactions use real deal data showing what buyers actually paid, while DCF relies on projected future cash flows and assumptions.'},
    {q:'Which metric captures value for ALL capital providers (debt + equity)?',a:'Enterprise Value',b:'Equity Value',correct:'a',explain:'Enterprise Value represents the total value of the firm to all investors (debt, equity, preferred), while Equity Value is the residual value for common shareholders only.'},
    {q:'Which is ALWAYS higher for a company with positive net debt?',a:'Enterprise Value',b:'Equity Value',correct:'a',explain:'Enterprise Value = Equity Value + Net Debt + Preferred Stock + Minority Interest. With positive net debt, EV is always higher than Equity Value.'},
    {q:'Which CAN be negative?',a:'Book Value of Equity',b:'Market Value of Equity (for a public co.)',correct:'a',explain:'Book equity can be negative if a company has accumulated losses or paid large dividends. Market equity value for public companies cannot be negative since share prices cannot go below zero.'},
    {q:'Which uses an EXIT MULTIPLE to estimate future value?',a:'Terminal Value (Exit Multiple method)',b:'Comparable Companies Analysis',correct:'a',explain:'The Exit Multiple method applies an EV/EBITDA multiple to the final projected year to estimate terminal value, while comps use current multiples on current metrics.'},
    {q:'For a high-growth tech startup, which metric is MORE likely used for valuation?',a:'EV/Revenue',b:'EV/EBITDA',correct:'a',explain:'High-growth companies often have negative or minimal EBITDA, so EV/Revenue is used since it captures top-line growth potential.'},
    {q:'In precedent transactions, which date\'s multiples matter more—announcement or close?',a:'Announcement',b:'Close',correct:'b',explain:'Close date multiples reflect actual historical performance and final transaction terms, making them more relevant for valuation analysis.'},
    {q:'For a mature utility, which multiple is typically more reliable?',a:'EV/EBITDA',b:'EV/Revenue',correct:'a',explain:'EV/EBITDA is more stable for utilities because their revenue can be steady but profitability varies with operating efficiency and cost structure.'},
    {q:'When comparing multiples across industries, which adjustment is most critical?',a:'Capex intensity',b:'Tax rate',correct:'a',explain:'Capex intensity directly affects normalized cash flow and comparability; companies with high capex appear less profitable on similar revenue.'},
    {q:'In a hockey-stick model, which year\'s growth rate drives the terminal value most?',a:'Year 5',b:'Perpetual growth rate',correct:'b',explain:'Terminal value represents years 6+ to infinity; the perpetual growth assumption dwarfs any single year\'s growth rate in its impact.'},
    {q:'What happens to EV if you reduce WACC in a DCF?',a:'EV increases',b:'EV decreases',correct:'a',explain:'Lower discount rate increases present value of future cash flows, raising enterprise value proportionally.'},
    {q:'Which is more conservative: using median or mean comp multiples?',a:'Median',b:'Mean',correct:'a',explain:'Median is less affected by outliers and extreme valuations, making it a more conservative and reliable benchmark.'},
    {q:'For a pre-revenue SaaS startup, which metric should replace EBITDA?',a:'ARR (annual recurring revenue)',b:'Gross profit',correct:'a',explain:'ARR better captures the forward-looking value of a SaaS business; gross profit is often negative pre-profitability.'},
    {q:'In an exit multiple sensitivity, which is typically wider: 5x or 10x EBITDA range?',a:'5x range',b:'10x range',correct:'b',explain:'A 10x multiple has a wider absolute dollar range ($10M swing per $1M EBITDA) than a 5x multiple ($5M swing).'},
    {q:'When valuing a distressed company, should you use current or normalized EBITDA?',a:'Current EBITDA',b:'Normalized EBITDA',correct:'b',explain:'Normalized EBITDA strips out one-time charges and cyclical dips, reflecting sustainable earnings power for valuation.'},
    {q:'For a high-growth company, does using 10Y instead of 5Y forecast periods increase or decrease valuation?',a:'Increases',b:'Decreases',correct:'a',explain:'Longer forecast periods capture more high-growth years before terminal value, pushing more value into near-term, higher-growth periods.'},
    {q:'In trading comparables, are stocks typically valued at higher or lower multiples than M&A targets?',a:'Higher multiples',b:'Lower multiples',correct:'b',explain:'M&A targets trade at a premium to reflect control; public stocks reflect minority stake value and liquidity discounts.'},
    {q:'Does a higher cost of equity increase or decrease target enterprise value in a DCF?',a:'Increases',b:'Decreases',correct:'b',explain:'Higher cost of equity raises the WACC discount rate, reducing the present value of all future cash flows.'},
    {q:'Which is more sensitive to long-term assumptions: EV/EBITDA or DCF?',a:'EV/EBITDA',b:'DCF',correct:'b',explain:'DCF heavily depends on terminal value and perpetuity growth assumptions, making it far more sensitive to long-term inputs than snapshot multiples.'},
    {q:'For cyclical industries, which metric should be normalized?',a:'Revenue',b:'EBITDA or earnings',correct:'b',explain:'EBITDA/earnings at cyclical peaks or troughs can distort valuation; normalizing smooths the cycle to reflect mid-point earnings power.'},
    {q:'In an LBO model, which valuation scenario typically shows the highest exit value?',a:'Highest leverage',b:'Lowest leverage',correct:'b',explain:'Lower leverage preserves more equity value; highest leverage maximizes returns only if company grows, but baseline exit is higher with less debt.'},
    {q:'When an industry median EV/EBITDA is 8x and your company is 10x, what\'s implied?',a:'Company is undervalued',b:'Company is overvalued or higher quality',correct:'b',explain:'Trading above median suggests market sees higher growth, quality, margins, or lower risk than peers.'},
    {q:'For a regulated utility with capped returns, which valuation approach is most appropriate?',a:'DCF with market WACC',b:'Regulatory asset base (RAB)',correct:'b',explain:'Regulated utilities are valued on their regulatory RAB multiplied by allowed return on equity, not typical market multiples.'},
    {q:'In comparable company analysis, does synergy value appear in the trading multiples?',a:'Yes',b:'No',correct:'b',explain:'Trading multiples reflect standalone value; synergies are deal-specific and not embedded in public company multiples.'},
    {q:'Which typically trades at a lower multiple: profitable high-growth or low-growth mature?',a:'High-growth',b:'Mature',correct:'b',explain:'Mature, lower-growth companies command lower multiples due to limited upside and cash flow predictability.'},
    {q:'Does assuming 3% perpetual growth vs 2% increase or decrease terminal value?',a:'Increases',b:'Decreases',correct:'a',explain:'Higher perpetuity growth rate expands the terminal value as a multiple of the final year cash flow.'},
    {q:'In a waterfall valuation chart, which component typically dominates value?',a:'Forecast period cash flows',b:'Terminal value',correct:'b',explain:'Terminal value usually represents 60-80% of total DCF value due to discounting years 1-5 heavily and capturing perpetuity.'},
    {q:'For a company with negative free cash flow, which is the better valuation proxy?',a:'EV/Revenue',b:'EV/EBITDA',correct:'a',explain:'EV/Revenue avoids relying on profitability metrics; it\'s most useful when earnings are distorted or negative.'},
    {q:'Does a company with operating leverage typically trade at higher or lower multiples?',a:'Higher',b:'Lower',correct:'a',explain:'Operating leverage amplifies earnings growth during upturns, justifying higher multiples on the same revenue base.'},
    {q:'In M&A valuation, what premium to current stock price is typical for unsolicited offers?',a:'10-20%',b:'30-50%',correct:'b',explain:'Unsolicited bids require 30-50%+ premiums to convince shareholders to sell; negotiated deals often settle in this range.'},
    {q:'Which is more volatile: asset-based valuation or income-based (DCF) valuation?',a:'Asset-based',b:'Income-based',correct:'b',explain:'Income-based valuations swing with growth, profitability, and discount rate assumptions; asset values are more stable.'},
    {q:'For a holding company with multiple subsidiaries, which valuation method is most common?',a:'Sum-of-parts (SOTP)',b:'Consolidated DCF',correct:'a',explain:'SOTP values each subsidiary separately and adds them, avoiding conglomerate discount and providing granular visibility.'},
    {q:'Does the presence of preferred stock increase or decrease common equity value in a cap table?',a:'Increases',b:'Decreases',correct:'b',explain:'Preferred stock has liquidation priority over common; more preferred shares dilute common shareholders\' claim on residual value.'},
    {q:'In a relative valuation, should you include or exclude newly public IPO comparables?',a:'Include',b:'Exclude',correct:'a',explain:'Recent IPOs provide fresh market pricing but may have limited trading history; include with awareness of potential volatility.'},
    {q:'Which depreciation method results in lower reported earnings but higher total cash flow over asset life?',a:'Straight-line',b:'Accelerated',correct:'b',explain:'Accelerated depreciation defers more taxes early; total PV of cash is higher, but reported earnings are lower initially.'},
    {q:'For a business with 20% ROIC and 5% WACC, is the company creating or destroying value?',a:'Creating value',b:'Destroying value',correct:'a',explain:'ROIC > WACC means incremental investments generate returns above the cost of capital, creating shareholder value.'},
    {q:'In a sum-of-parts valuation, does the holding company premium or discount apply?',a:'Discount (conglomerate)',b:'Premium',correct:'a',explain:'Conglomerate discounts typically apply as markets penalize complexity and diversification, reducing the sum of parts value.'},
    {q:'When selling a company, should you use historical or forward multiples?',a:'Historical',b:'Forward',correct:'b',explain:'Forward multiples reflect buyer expectations of future performance and are more relevant to sale price negotiations.'},
    {q:'For a real estate company, which metric better reflects value: EBITDA or FFO (funds from operations)?',a:'EBITDA',b:'FFO',correct:'b',explain:'FFO adds back depreciation and excludes gains on property sales, better reflecting sustainable rental income for REITs.'},
    {q:'In an equity research report, which multiple should you use to set price targets?',a:'Median comp multiple',b:'Your own DCF',correct:'b',explain:'Your DCF-derived target is independent and represents your research; multiples are supporting evidence, not the driver.'},
    {q:'Does increasing the terminal growth rate or extending the forecast period have more impact?',a:'Terminal growth rate',b:'Extend forecast',correct:'a',explain:'Terminal value is typically 70%+ of total value; a 1% change in perpetual growth dwarfs adding years to the forecast.'},
    {q:'For a company with $100M EBITDA and 6x net leverage, is it more likely overvalued or undervalued?',a:'Overvalued',b:'Undervalued',correct:'a',explain:'6x leverage implies $600M debt and likely financial stress; equity is subordinated and likely expensive relative to intrinsic value.'},
    {q:'Should a cyclical top-line comps table use current year or normalized revenue?',a:'Current year',b:'Normalized revenue',correct:'b',explain:'Normalized revenue removes cyclicality, making multiples comparable across companies in different cycle phases.'},
    {q:'In a buyout scenario, does the sponsor want higher or lower multiples to drive returns?',a:'Higher multiples',b:'Lower multiples',correct:'b',explain:'Lower entry multiples leave room for expansion and leverage; buyouts thrive on buying cheap and improving/exiting at higher multiples.'},
    {q:'For a business with 50% of value in terminal value, is the valuation more or less reliant on accuracy?',a:'More reliant',b:'Less reliant',correct:'a',explain:'Heavy terminal dependence means small changes to growth, WACC, or margins dramatically swing the total valuation.'},
    {q:'Which is typically higher: equity value multiples (P/E) or enterprise value multiples (EV/EBITDA)?',a:'P/E',b:'EV/EBITDA',correct:'b',explain:'EV/EBITDA is gross of leverage and interest; P/E is equity-only and influenced by capital structure, making cross-sector comparison difficult.'}
  ],
  acct:[
    {q:'Which financial statement shows performance over a PERIOD of time?',a:'Income Statement',b:'Balance Sheet',correct:'a',explain:'The Income Statement covers a period (quarter/year) of revenues and expenses. The Balance Sheet is a snapshot of financial position at one specific date.'},
    {q:'Which is a BETTER indicator of a company\'s actual cash generation?',a:'Cash Flow Statement',b:'Income Statement',correct:'a',explain:'The Income Statement includes non-cash items like depreciation and does not reflect working capital or capex changes, making the Cash Flow Statement more accurate for cash assessment.'},
    {q:'Which is filed MORE frequently with the SEC?',a:'10-Q (quarterly)',b:'10-K (annual)',correct:'a',explain:'10-Q reports are filed quarterly (40-45 days after quarter end), while 10-K annual reports are filed once per year (60-90 days after fiscal year end).'},
    {q:'Which side of the balance sheet does Accounts Receivable appear on?',a:'Assets',b:'Liabilities',correct:'a',explain:'Accounts Receivable is an asset — it represents money owed TO the company by customers for goods/services already delivered.'},
    {q:'Which side of the balance sheet does Deferred Revenue appear on?',a:'Liabilities',b:'Assets',correct:'a',explain:'Deferred Revenue is a liability — the company received cash but has not yet delivered the goods/services, so it owes future performance to customers.'},
    {q:'An increase in Accounts Receivable represents a _____ of cash.',a:'Use (decrease)',b:'Source (increase)',correct:'a',explain:'When AR increases, the company has earned revenue but not collected cash yet. This is a use of cash — money is tied up in uncollected receivables.'},
    {q:'An increase in Accounts Payable represents a _____ of cash.',a:'Source (increase)',b:'Use (decrease)',correct:'a',explain:'When AP increases, the company has received goods/services but hasn\'t paid yet. This is a source of cash — the company is holding onto cash longer.'},
    {q:'Depreciation appears as an EXPENSE on which statement?',a:'Income Statement',b:'Cash Flow Statement',correct:'a',explain:'Depreciation is a non-cash expense that reduces operating income on the Income Statement. On the Cash Flow Statement, it is ADDED BACK because it doesn\'t reduce actual cash.'},
    {q:'Which depreciation method shows HIGHER net income in early years?',a:'Straight-line',b:'Accelerated',correct:'a',explain:'Straight-line spreads depreciation evenly, so early-year expense is lower and net income is higher. Accelerated front-loads more expense in early years, reducing early net income.'},
    {q:'Where does Net Income flow to on the Balance Sheet?',a:'Retained Earnings (Equity)',b:'Cash (Assets)',correct:'a',explain:'Net Income flows into Retained Earnings on the Balance Sheet. It does NOT directly go to cash — cash changes are captured on the Cash Flow Statement.'},
    {q:'On the income statement, does interest expense reduce or increase net income?',a:'Reduce',b:'Increase',correct:'a',explain:'Interest expense is a deduction from operating income; higher debt interest lowers net income and EPS.'},
    {q:'When a customer prepays $100 for future services, is it initially revenue or deferred revenue?',a:'Revenue',b:'Deferred revenue (liability)',correct:'b',explain:'Cash received before service delivery is deferred revenue; it becomes income as services are rendered over time.'},
    {q:'Does accounts receivable age impact cash flow from operations?',a:'Yes',b:'No',correct:'a',explain:'Older AR suggests delayed collections; increasing AR ties up cash, reducing CFO regardless of revenue level.'},
    {q:'In depreciation, is the expense on the IS matched by a non-cash benefit on the balance sheet?',a:'Yes',b:'No',correct:'a',explain:'Depreciation reduces net income (IS) but is a non-cash charge; the matching is the reduction in gross fixed assets (BS).'},
    {q:'Does a company record revenue when cash is received or when performance obligation is satisfied?',a:'Cash received',b:'Obligation satisfied',correct:'b',explain:'ASC 606 and IFRS 15 require revenue recognition when goods/services are provided, regardless of payment timing (accrual basis).'},
    {q:'If inventory increases from $50M to $60M, is this a source or use of cash in CFO?',a:'Source',b:'Use',correct:'b',explain:'Inventory increase ties up cash; it\'s a use of cash and reduces operating cash flow.'},
    {q:'Does the straight-line depreciation method result in higher or lower early-year expenses than accelerated?',a:'Higher',b:'Lower',correct:'b',explain:'Straight-line is uniform each year; accelerated (MACRS, DDB) front-loads depreciation, so straight-line is lower early on.'},
    {q:'On a multi-step income statement, is gross profit calculated before or after operating expenses?',a:'Before',b:'After',correct:'a',explain:'Gross profit = Revenue - COGS; operating expenses (SG&A, R&D) are deducted after to arrive at operating income.'},
    {q:'When a company pays off a $5M account payable, does this reduce or increase CFO?',a:'Reduce',b:'Increase',correct:'a',explain:'Paying off payables is a use of cash and reduces operating cash flow in the period of payment.'},
    {q:'Is the allowance for doubtful accounts a contra-asset or a separate liability?',a:'Contra-asset',b:'Separate liability',correct:'a',explain:'Allowance for doubtful accounts reduces gross AR on the balance sheet; it\'s not a separate liability.'},
    {q:'Does the cash conversion cycle shorten with higher accounts payable days?',a:'Yes',b:'No',correct:'a',explain:'Longer AP payment terms delay cash outflows; CCC = Days Inventory + Days Sales Outstanding - Days Payable Outstanding.'},
    {q:'When a building is sold at a gain, does the gain appear on the IS or only as a cash inflow?',a:'Income statement',b:'Cash flow only',correct:'a',explain:'Sale gains/losses appear on the IS as other income/expense; the full cash proceeds adjust investing cash flow.'},
    {q:'For a warranty reserve, is it recorded as a liability when the warranty is issued or when claimed?',a:'When issued',b:'When claimed',correct:'a',explain:'GAAP requires accruing estimated warranty costs when products are sold, matching expense to revenue (matching principle).'},
    {q:'Does a company\'s net income equal its change in retained earnings?',a:'Yes',b:'No',correct:'b',explain:'Change in RE = Net Income - Dividends + other comprehensive income adjustments; they\'re not equal unless no dividends are paid.'},
    {q:'In a classified balance sheet, are current liabilities those due within one year or five years?',a:'One year',b:'Five years',correct:'a',explain:'Current liabilities are obligations due within 12 months; long-term debt beyond 12 months is non-current.'},
    {q:'Does an operating lease (pre-ASC 842) appear on the balance sheet as an asset and liability?',a:'Yes',b:'No',correct:'b',explain:'Pre-ASC 842, operating leases were off-balance-sheet; ASC 842 now requires both asset and liability recognition.'},
    {q:'When cost of goods sold increases, does gross margin increase or decrease?',a:'Increase',b:'Decrease',correct:'b',explain:'Gross margin = (Revenue - COGS) / Revenue; higher COGS directly reduces gross margin percentage.'},
    {q:'Is research and development typically expensed immediately or capitalized and amortized?',a:'Expensed',b:'Capitalized',correct:'a',explain:'Under GAAP, R&D is generally expensed when incurred because future benefits are uncertain.'},
    {q:'When a company receives a bank loan, does retained earnings increase or stay flat?',a:'Increase',b:'Stay flat',correct:'b',explain:'A loan increases cash and debt (liabilities); retained earnings are unchanged unless the cash is deployed to generate profit.'},
    {q:'Does accounts receivable include or exclude bad debts written off?',a:'Include',b:'Exclude',correct:'b',explain:'AR shown on the BS is net of allowance; written-off amounts are removed from AR and the allowance reserve.'},
    {q:'In the statement of changes in equity, does a dividend paid increase or decrease equity?',a:'Increase',b:'Decrease',correct:'b',explain:'Dividends are distributions to shareholders; they reduce retained earnings and total equity.'},
    {q:'Is accrued expense a current liability even if not yet paid in cash?',a:'Yes',b:'No',correct:'a',explain:'Accrued expenses represent liabilities incurred but not yet paid; they\'re recorded and classified as current liabilities.'},
    {q:'When inventory is sold, does it immediately affect cash flow or only net income?',a:'Cash flow only',b:'Net income only',correct:'b',explain:'Sale of inventory reduces net income via COGS but doesn\'t directly affect cash flow until the AR is collected.'},
    {q:'Does the cost of capital expenditure appear on the IS or only on the balance sheet?',a:'Income statement',b:'Balance sheet',correct:'b',explain:'Capex is capitalized as an asset; depreciation of the asset then appears on the IS over useful life.'},
    {q:'For a company with increasing deferred tax assets, does this benefit or hurt taxable income?',a:'Benefit',b:'Hurt',correct:'a',explain:'Deferred tax assets arise from timing differences; they reduce future tax payments and benefit future earnings.'},
    {q:'Does revenue recognition under ASC 606 require five or four steps?',a:'Four',b:'Five',correct:'b',explain:'ASC 606 has five steps: identify contract, identify performance obligations, determine transaction price, allocate price, and recognize revenue.'},
    {q:'In a segment reporting, should you reconcile to consolidated net income or operating income?',a:'Net income',b:'Operating income',correct:'a',explain:'Segment operating profit is reconciled to consolidated net income to ensure no revenues or profits are missing.'},
    {q:'Does amortization of an intangible asset reduce equity or just net income?',a:'Equity only',b:'Both',correct:'b',explain:'Amortization reduces net income (IS), which flows through to reduce retained earnings and total equity (BS).'},
    {q:'When a company records stock-based compensation, does the equity value increase or decrease?',a:'Increase',b:'Decrease',correct:'b',explain:'Stock-based comp is an expense reducing net income and retained earnings; it also increases shares outstanding, diluting ownership.'},
    {q:'Is the change in working capital a source or use of cash in CFO?',a:'Source',b:'Use',correct:'a',explain:'Working capital includes AR, inventory, and AP; a decrease is a source of cash, and an increase is a use (investing.'},
    {q:'For a company acquiring another, does goodwill appear on the acquirer\'s balance sheet?',a:'Yes',b:'No',correct:'a',explain:'Goodwill (purchase price minus fair value of identifiable net assets) is capitalized as an asset on the acquirer\'s balance sheet.'},
    {q:'Does goodwill impairment reduce net income or only balance sheet value?',a:'Net income',b:'Balance sheet only',correct:'a',explain:'Goodwill impairment is a non-cash charge to the IS, reducing net income and equity via retained earnings.'},
    {q:'Are discontinued operations presented separately on the income statement?',a:'Yes',b:'No',correct:'a',explain:'FASB requires discontinued operations be shown separately (usually below continuing operations) with their revenues and expenses isolated.'},
    {q:'Does increasing the useful life of an asset increase or decrease depreciation expense?',a:'Increase',b:'Decrease',correct:'b',explain:'Longer useful life spreads cost over more years, reducing annual depreciation expense under straight-line method.'},
    {q:'In a 10-Q filing, must quarterly GAAP EPS be presented with or without non-GAAP adjustments?',a:'With',b:'Without',correct:'a',explain:'10-Q requires GAAP EPS; non-GAAP metrics are supplemental and must be clearly reconciled to GAAP.'},
    {q:'Does a company\'s effective tax rate equal its statutory tax rate?',a:'Yes',b:'No',correct:'b',explain:'Effective tax rate varies based on permanent and temporary differences; it rarely equals the statutory rate.'},
    {q:'When a company records a provision for litigation, does it recognize a liability immediately?',a:'Yes',b:'No',correct:'a',explain:'If a loss is probable and estimable, GAAP requires accrual of a liability and expense in the current period.'},
    {q:'Does the balance sheet equation hold after a company records a loss?',a:'Yes',b:'No',correct:'a',explain:'Assets = Liabilities + Equity always holds; losses reduce equity via retained earnings, maintaining the equation.'},
    {q:'In a cashflow statement, is operating cash flow from the IS, BS, or both?',a:'Income statement',b:'Both',correct:'b',explain:'CFO reconciles net income (IS) with changes in balance sheet accounts to derive actual cash generated from operations.'},
    {q:'Does a stock buyback increase or decrease shares outstanding immediately?',a:'Increase',b:'Decrease',correct:'b',explain:'Buybacks purchase shares for retirement; they reduce shares outstanding and EPS (absent earnings growth to offset).'}
  ],
  dcf:[
    {q:'Which has a HIGHER cost of capital?',a:'Equity',b:'Debt',correct:'a',explain:'Equity holders bear more risk (paid last in liquidation, no guaranteed returns), so they demand higher returns. Debt is cheaper because it is senior and interest is tax-deductible.'},
    {q:'Which has a HIGHER WACC, all else equal?',a:'A small startup',b:'A large blue-chip company',correct:'a',explain:'Smaller companies have higher risk (less diversified, less stable cash flows), so investors demand higher returns, increasing the WACC.'},
    {q:'Adding MORE debt to the capital structure initially does what to WACC?',a:'Decreases WACC',b:'Increases WACC',correct:'a',explain:'Up to a point, adding cheaper debt (tax-deductible interest) lowers the blended WACC. Beyond optimal leverage, financial distress risk increases WACC.'},
    {q:'In CAPM, which component captures company-specific risk?',a:'Beta',b:'Risk-free rate',correct:'a',explain:'Beta measures how volatile a stock is relative to the market. A higher beta means more company-specific systematic risk and a higher required return.'},
    {q:'A HIGHER discount rate does what to the present value of future cash flows?',a:'Decreases PV',b:'Increases PV',correct:'a',explain:'A higher discount rate means future cash flows are worth less today. The denominator (1+r)^n gets larger, shrinking the present value.'},
    {q:'Which discount rate is used for Free Cash Flow to Firm (FCFF)?',a:'WACC',b:'Cost of Equity',correct:'a',explain:'FCFF represents cash available to ALL capital providers, so it is discounted at WACC (the blended cost). Cost of Equity is used only for Free Cash Flow to Equity.'},
    {q:'The risk-free rate is typically proxied by which instrument?',a:'10-year US Treasury yield',b:'Corporate bond yield',correct:'a',explain:'The 10-year US Treasury is considered risk-free (backed by US government). Corporate bonds carry default risk and are not appropriate as a risk-free proxy.'},
    {q:'The IRR is the discount rate at which the NPV equals:',a:'$0',b:'The initial investment',correct:'a',explain:'The IRR is the rate that makes NPV exactly zero. It represents the breakeven rate of return. If IRR > WACC, the project creates value.'},
    {q:'If IRR exceeds the company\'s WACC, should the company invest?',a:'Yes',b:'No',correct:'a',explain:'If IRR > WACC, the project generates returns above the cost of capital, creating value for shareholders. The NPV will be positive.'},
    {q:'Which terminal value method directly uses a comparable EV/EBITDA multiple?',a:'Exit Multiple method',b:'Perpetuity Growth method',correct:'a',explain:'The Exit Multiple method applies an EV/EBITDA multiple to terminal year EBITDA. The Perpetuity Growth method uses a long-term growth rate in the Gordon Growth formula.'},
    {q:'In CAPM, does beta measure systematic or unsystematic risk?',a:'Systematic',b:'Unsystematic',correct:'a',explain:'Beta measures systematic (market) risk that cannot be diversified away; unsystematic risk is firm-specific and is diversified away.'},
    {q:'If the risk-free rate is 2% and equity risk premium is 6%, and beta is 1.5, what is cost of equity?',a:'11%',b:'9%',correct:'a',explain:'Cost of Equity = 2% + 1.5 × 6% = 2% + 9% = 11%.'},
    {q:'Does an increase in debt increase or decrease the cost of equity via beta?',a:'Increase',b:'Decrease',correct:'a',explain:'Leverage increases equity beta (financial risk); higher beta raises cost of equity, even if cost of debt is lower.'},
    {q:'In WACC, are debt and equity costs weighted by book or market values?',a:'Book value',b:'Market value',correct:'b',explain:'WACC uses market values because investors value companies at market prices; book values are historical and irrelevant for cost of capital.'},
    {q:'Does WACC or cost of equity apply when discounting free cash flow to the firm (FCFF)?',a:'WACC',b:'Cost of equity',correct:'a',explain:'FCFF is cash available to all investors (debt and equity); WACC is the blended cost of all capital sources.'},
    {q:'If a company has negative FCFF but positive FCFE, is this possible?',a:'Yes',b:'No',correct:'a',explain:'Yes; FCFE = FCFF - Net debt repayment; a company can have negative FCFF but positive FCFE if it\'s using debt to fund cash flow.'},
    {q:'Does terminal value assume a going concern or company liquidation?',a:'Going concern',b:'Liquidation',correct:'a',explain:'Terminal value assumes perpetual operation; liquidation would be a recovery value analysis, not DCF terminal value.'},
    {q:'In a DCF with a perpetuity growth model, what rate is typically assumed for terminal growth?',a:'GDP growth (2-3%)',b:'10%+',correct:'a',explain:'Long-term perpetual growth should approximate GDP growth; assuming 10%+ forever is economically unrealistic and unsustainable.'},
    {q:'Does increasing the discount rate increase or decrease the present value of future cash flows?',a:'Increase',b:'Decrease',correct:'b',explain:'Higher discount rate reduces PV; discounting at 10% vs. 5% yields lower present values.'},
    {q:'If cost of equity is higher than cost of debt, does a company benefit from more debt?',a:'Yes',b:'No',correct:'b',explain:'Cost of equity > cost of debt is typical; more debt increases financial risk (equity beta), raising cost of equity above any debt savings.'},
    {q:'In a two-stage DCF, does the explicit forecast period represent years 1-5 or 1-10?',a:'1-5',b:'1-10',correct:'a',explain:'Standard practice is to explicitly forecast 5 years, then use a terminal value perpetuity for years 6 onward.'},
    {q:'Does a company with high capex relative to depreciation have high or low FCFF?',a:'High FCFF',b:'Low FCFF',correct:'b',explain:'High capex reduces free cash flow; capex intensity creates cash drag relative to reported EBITDA or NOPAT.'},
    {q:'When discounting equity cash flows (FCFE), should you use cost of equity or WACC?',a:'Cost of equity',b:'WACC',correct:'a',explain:'FCFE is residual cash to equity holders after debt costs; it\'s discounted at cost of equity, not WACC.'},
    {q:'Does a company with zero net debt have WACC equal to cost of equity or cost of debt?',a:'Cost of equity',b:'Cost of debt',correct:'a',explain:'With zero net debt, WACC = Cost of equity (100% equity-financed); no debt means no weighted cost of debt.'},
    {q:'In terminal value, does a growth rate of 3% or 0% result in higher value?',a:'3% growth',b:'0% growth',correct:'a',explain:'Gordon growth model: TV = FCF × (1 + g) / (r - g); higher g increases TV (assuming g < r).'},
    {q:'Does the unlevered cost of equity or levered cost of equity apply to FCFF?',a:'Unlevered',b:'Levered',correct:'a',explain:'FCFF represents cash to all investors; the unlevered (asset) cost of equity is used to discount it.'},
    {q:'For a cyclical business, should you use peak-year or normalized EBITDA as the basis for FCFF?',a:'Peak-year',b:'Normalized',correct:'b',explain:'Normalized EBITDA reflects sustainable operating performance; peak-year inflates cash flow and overvalues the business.'},
    {q:'When you increase the tax rate in a DCF, does WACC increase or decrease?',a:'Increase',b:'Decrease',correct:'b',explain:'Higher tax rate increases the debt tax shield, reducing WACC because debt becomes a more valuable tax deduction.'},
    {q:'Does terminal value represent 50%, 70%, or 90% of total DCF value in most cases?',a:'50%',b:'70%',correct:'b',explain:'Terminal value typically represents 60-80% of total value due to explicit forecast years being heavily discounted and terminal value capturing perpetuity.'},
    {q:'If a company has negative NOPAT due to losses, is a DCF valuation still appropriate?',a:'Yes',b:'No',correct:'b',explain:'DCF relies on discounting positive free cash flows; unprofitable companies are better valued via liquidation value or asset-based approaches.'},
    {q:'In WACC, does the tax rate apply to the cost of debt or cost of equity?',a:'Cost of debt',b:'Cost of equity',correct:'a',explain:'WACC uses Rd(1-T), where T is the tax rate; the tax shield on debt reduces its after-tax cost, but not cost of equity.'},
    {q:'Does a higher inflation rate increase or decrease the risk-free rate?',a:'Increase',b:'Decrease',correct:'a',explain:'Risk-free rates include an inflation premium; higher expected inflation raises the nominal risk-free rate.'},
    {q:'When conducting a sensitivity analysis in a DCF, which two inputs are most commonly varied?',a:'Revenue and COGS',b:'WACC and terminal growth',correct:'b',explain:'WACC and terminal growth assumptions have the largest impact on valuation; they\'re the primary levers in sensitivity analysis.'},
    {q:'For a startup with no historical cash flow, should you use DCF or comparable multiples?',a:'DCF',b:'Comparable multiples',correct:'b',explain:'DCF requires revenue and EBITDA forecasts; startups are better valued via precedent rounds (venture multiples) or comps on similar pre-revenue companies.'},
    {q:'Does reinvestment in the business (net working capital increases) increase or decrease FCFF?',a:'Increase',b:'Decrease',correct:'b',explain:'FCFF = NOPAT - Reinvestment (capex + change in NWC); more reinvestment reduces free cash available to all investors.'},
    {q:'In a leveraged buyout DCF, is the discount rate the sponsor\'s required return or the company\'s WACC?',a:'Sponsor\'s required return',b:'Company\'s WACC',correct:'a',explain:'LBO models discount cash flows at the sponsor\'s target IRR (hurdle rate), not the company\'s WACC.'},
    {q:'Does a company with declining ROIC have positive or negative economic value added?',a:'Positive',b:'Negative',correct:'b',explain:'EVA = (ROIC - WACC) × Invested Capital; if ROIC falls below WACC, the company destroys value.'},
    {q:'When comparing two companies with different capital structures, which metric is most appropriate to use?',a:'Levered DCF',b:'Unlevered DCF',correct:'b',explain:'Unlevered DCF avoids capital structure distortion; it allows apples-to-apples comparison by assuming the same leverage across companies.'},
    {q:'Does FCFF include or exclude interest paid?',a:'Include',b:'Exclude',correct:'b',explain:'FCFF = NOPAT - Capex - Change in NWC (no interest deduction); interest is reflected in WACC, not cash flow.'},
    {q:'For a company with 20% revenue growth and 5% terminal growth, is the transition gradual or immediate?',a:'Gradual',b:'Immediate',correct:'a',explain:'Best practice is to linearly interpolate or use a fade schedule to gradually lower growth from 20% to 5% over the forecast period.'},
    {q:'Does Beta above 1 indicate higher or lower systematic risk than the market?',a:'Higher',b:'Lower',correct:'a',explain:'Beta > 1.0 means the stock is more volatile than the market index; beta < 1.0 means lower volatility.'},
    {q:'When discounting terminal value in a DCF, is it discounted to present day or end of forecast period?',a:'Present day',b:'End of forecast period',correct:'a',explain:'Terminal value is calculated at the end of the explicit forecast period, then discounted back to present (Year 0).'},
    {q:'Does a mid-cycle EBITDA assumption increase or decrease conservatism in a DCF?',a:'Increase',b:'Decrease',correct:'b',explain:'Mid-cycle reflects normalized earnings; using peak earnings increases valuation but decreases conservatism.'},
    {q:'In a DCF, is the exit value (terminal value) a required input or optional?',a:'Required',b:'Optional',correct:'a',explain:'Terminal value is essential; it captures 60-80% of value and cannot be omitted from a DCF analysis.'},
    {q:'Does a levered company have higher or lower beta than an unlevered company?',a:'Higher',b:'Lower',correct:'a',explain:'Leverage increases financial risk, raising equity beta; unlevered beta removes financial leverage effect.'},
    {q:'For a company in a declining industry, should terminal growth be positive, zero, or negative?',a:'Positive',b:'Zero or negative',correct:'b',explain:'Terminal growth < GDP growth is appropriate for declining industries; perpetual positive growth assumes market expansion.'},
    {q:'Does FCFE include or exclude dividends paid?',a:'Include',b:'Exclude',correct:'b',explain:'FCFE = Available cash to equity; dividends are paid from FCFE, not deducted before calculating it.'},
    {q:'When a company transitions from high growth to stable growth, does beta increase or decrease?',a:'Increase',b:'Decrease',correct:'b',explain:'Stable growth reduces earnings volatility and financial risk; beta typically declines as the business matures.'},
    {q:'Is a 3% perpetual growth assumption appropriate for a mature market or emerging market company?',a:'Mature market',b:'Emerging market',correct:'a',explain:'Mature markets grow with GDP (2-3%); emerging markets justify higher growth assumptions due to higher GDP expansion potential.'},
    {q:'In a scenario analysis, does the base case or bear case typically assume the lowest WACC?',a:'Base case',b:'Bear case',correct:'a',explain:'Base case represents management\'s plan with moderate risk; bear case assumes distress, higher risk, and typically higher WACC.'}
  ],
  ma:[
    {q:'In an acquisition, which typically includes a CONTROL PREMIUM?',a:'Offer price to target shareholders',b:'Current trading price before announcement',correct:'a',explain:'Acquirers typically pay a 20-40% premium above the pre-announcement trading price to gain control of the target company.'},
    {q:'Which type of M&A deal process typically yields a HIGHER price?',a:'Broad auction (many bidders)',b:'Negotiated sale (one buyer)',correct:'a',explain:'Competitive tension from multiple bidders in a broad auction typically drives the price higher than a single-buyer negotiated deal.'},
    {q:'Which M&A consideration is MORE likely to be accretive to EPS?',a:'100% Cash deal',b:'100% Stock deal',correct:'a',explain:'Cash deals avoid share dilution, so they are more likely to be accretive to EPS. Stock deals increase share count, which can dilute earnings per share.'},
    {q:'In a stock-for-stock merger, the buyer\'s P/E must be _____ than the target\'s P/E for the deal to be accretive.',a:'Higher',b:'Lower',correct:'a',explain:'If the buyer has a higher P/E (cheaper earnings), buying a company with a lower P/E (more earnings per dollar) is accretive. The buyer pays less for more earnings.'},
    {q:'Which defense mechanism involves issuing new shares to dilute a hostile acquirer?',a:'Poison pill',b:'White knight',correct:'a',explain:'A poison pill (shareholder rights plan) allows existing shareholders to buy discounted shares, diluting the hostile bidder. A white knight is a friendly competing acquirer.'},
    {q:'Which type of synergy is EASIER to estimate and more commonly cited?',a:'Cost synergies',b:'Revenue synergies',correct:'a',explain:'Cost synergies (eliminating redundant roles, facilities) are more tangible and predictable. Revenue synergies (cross-selling, market expansion) are harder to quantify and less certain.'},
    {q:'In a sell-side process, who HIRES the investment bank?',a:'The target (seller)',b:'The acquirer (buyer)',correct:'a',explain:'In a sell-side advisory, the company being sold hires the bank to run the process, find buyers, and maximize sale price.'},
    {q:'Which creates MORE value in an acquisition: eliminating $10M costs or generating $10M new revenue?',a:'Eliminating $10M costs',b:'Generating $10M revenue',correct:'a',explain:'$10M in cost cuts drops straight to the bottom line (100% margin). $10M new revenue has associated costs, so only the profit margin portion flows to earnings.'},
    {q:'A "strategic buyer" typically pays _____ than a "financial buyer" (PE firm).',a:'More (higher premium)',b:'Less (lower premium)',correct:'a',explain:'Strategic buyers can realize operational synergies (cost savings, revenue growth) that financial buyers cannot, justifying a higher purchase price.'},
    {q:'Which fiduciary duty requires a board to seek the HIGHEST price when selling?',a:'Revlon duties',b:'Business judgment rule',correct:'a',explain:'Once a company decides to sell, Revlon duties require the board to maximize shareholder value by seeking the highest price. The business judgment rule provides broader discretion.'},
    {q:'In an acquisition, is the control premium typically 10-15%, 20-40%, or 50%+?',a:'10-15%',b:'20-40%',correct:'b',explain:'Control premiums typically range 20-40% above pre-announcement trading prices to compensate shareholders for selling control.'},
    {q:'Does a strategic buyer or financial buyer typically pay higher multiples?',a:'Strategic',b:'Financial',correct:'a',explain:'Strategic buyers can extract synergies and justify higher bids; financial buyers (PE) rely on leverage and operational improvements.'},
    {q:'In cash vs. stock deals, which structure is more dilutive to the acquirer\'s EPS?',a:'Cash',b:'Stock',correct:'b',explain:'Stock deals create new shares, diluting EPS immediately; cash deals preserve share count (though they use cash/debt).'},
    {q:'Does a shareholder vote requirement make a deal more or less likely to close?',a:'More likely',b:'Less likely',correct:'b',explain:'Shareholder vote introduces uncertainty; deals without vote requirements (e.g., all-cash under $25M) close with higher probability.'},
    {q:'When comparing accretion/dilution, does dilution imply the deal is bad?',a:'Yes',b:'No',correct:'b',explain:'Short-term dilution can be acceptable if the deal creates long-term value; accretion/dilution is just a metric, not a verdict.'},
    {q:'In hostile acquisitions, is a white knight or poison pill deployed by the target?',a:'White knight',b:'Poison pill',correct:'a',explain:'Both are target defenses, but a white knight is a friendly alternative buyer; poison pill is a structure that penalizes hostile bids.'},
    {q:'Does a break-up fee increase or decrease deal risk?',a:'Increase',b:'Decrease',correct:'b',explain:'Break-up fees (paid by buyer if deal fails) signal commitment; higher fees reduce target risk of deal termination.'},
    {q:'In an earn-out, who typically wants a higher earn-out percentage: buyer or seller?',a:'Buyer',b:'Seller',correct:'b',explain:'Sellers want cash at close; buyers prefer earn-outs because they tie payments to post-deal performance, reducing risk.'},
    {q:'Are revenue synergies or cost synergies typically more certain and achievable?',a:'Revenue',b:'Cost',correct:'b',explain:'Cost synergies (eliminating duplicate functions) are concrete; revenue synergies (cross-selling, market expansion) are riskier.'},
    {q:'Does a signed NDA prevent or allow due diligence in an M&A deal?',a:'Prevent',b:'Allow',correct:'b',explain:'NDAs protect confidentiality; they\'re signed before (or alongside) due diligence to allow data room access.'},
    {q:'In a tender offer, does the bidder or target company set the offer price?',a:'Bidder',b:'Target',correct:'a',explain:'Bidder initiates the tender offer with a proposed price; the target can reject, negotiate, or accept.'},
    {q:'For goodwill write-downs post-acquisition, does the buyer or seller take the charge?',a:'Buyer',b:'Seller',correct:'a',explain:'If the acquisition overpays relative to realized earnings, the buyer writes down goodwill and takes the non-cash charge.'},
    {q:'Does a cross-border M&A deal face regulatory or tax hurdles?',a:'Regulatory',b:'Tax',correct:'a',explain:'Cross-border deals face antitrust, foreign investment, and country-specific approvals; tax is manageable.'},
    {q:'In a leveraged recapitalization of a target (LBO-style), does equity value increase or decrease pre-deal close?',a:'Increase',b:'Decrease',correct:'b',explain:'LBO recap increases debt and drains cash; equity value decreases if debt proceeds are distributed to shareholders.'},
    {q:'Are advisory fees paid by the buyer or seller in an M&A process?',a:'Buyer',b:'Seller',correct:'b',explain:'By convention, the seller pays investment bank and legal fees; the buyer pays its own advisors separately.'},
    {q:'Does a higher tax rate make a debt-financed acquisition more or less attractive?',a:'More',b:'Less',correct:'a',explain:'Higher tax rates increase the value of debt tax shields; interest deductions save more in taxes.'},
    {q:'In a proxy fight, who are shareholders voting for: board seats or company sale?',a:'Board seats',b:'Company sale',correct:'a',explain:'Proxy fights are typically battles for board control; activist investors push for strategic changes or director removal.'},
    {q:'Does Regulation S-X apply to GAAP or non-GAAP financial statements in M&A filings?',a:'GAAP',b:'Non-GAAP',correct:'a',explain:'Reg S-X governs GAAP financial statements in SEC filings; non-GAAP metrics must be reconciled but are supplemental.'},
    {q:'In a 281G fairness opinion, who commissions the opinion: buyer or target?',a:'Buyer',b:'Target',correct:'b',explain:'Target boards obtain fairness opinions to support their fiduciary duty determination that the price is fair.'},
    {q:'Does a Section 338(h)(10) election increase or decrease the buyer\'s tax basis?',a:'Increase',b:'Decrease',correct:'a',explain:'338(h)(10) treats an asset sale as a stock sale for tax purposes; buyer gets a stepped-up basis, increasing depreciation shields.'},
    {q:'Are seller\'s indemnities typically broader or narrower than buyer\'s indemnities?',a:'Broader',b:'Narrower',correct:'b',explain:'Sellers push back on broad indemnity obligations; deals typically have narrower seller reps and indemnities than buyer expectations.'},
    {q:'In an all-stock merger, is the exchange ratio fixed or floating?',a:'Fixed',b:'Floating',correct:'a',explain:'Fixed exchange ratios are standard; floating ratios (rare) adjust if the buyer\'s stock price moves, protecting the target.'},
    {q:'Does a MAC (material adverse change) clause favor the buyer or seller?',a:'Buyer',b:'Seller',correct:'a',explain:'MAC allows buyers to walk away if material events damage the target; they\'re negotiated to be tight and hard to invoke.'},
    {q:'In a go-shop provision, can the target sell to a higher bidder after signing?',a:'Yes',b:'No',correct:'a',explain:'Go-shops allow target management to shop the deal and accept superior offers; they\'re a poison pill defense tool.'},
    {q:'Does the DCF or comparable multiples method give the buyer more control in valuation?',a:'DCF',b:'Comparable multiples',correct:'a',explain:'DCF inputs (terminal growth, WACC) are subjective and give the buyer more "nudge" power than comps.'},
    {q:'In a stock-for-stock merger, are tax-free reorganizations called Type A, B, or C?',a:'Type A',b:'Type B',correct:'a',explain:'Type A reorganizations are stock-for-stock mergers under Section 368; they can be tax-free if requirements are met.'},
    {q:'Are collar agreements used when acquisition consideration is cash or stock?',a:'Cash',b:'Stock',correct:'b',explain:'Collars protect the target from buyer stock price volatility; they fix value bands if the exchange ratio is tied to stock price.'},
    {q:'Does a reverse triangular merger protect the target\'s existing contracts and licenses?',a:'Yes',b:'No',correct:'a',explain:'Reverse triangular mergers preserve the target\'s legal identity; the target is the surviving entity, avoiding third-party consent issues.'},
    {q:'In a contingent value right (CVR), is it paid in cash or additional stock?',a:'Cash',b:'Stock',correct:'a',explain:'CVRs are typically paid in cash if milestones (EBITDA, FDA approval) are met post-close.'},
    {q:'Are minority shareholder appraisal rights available after a merger close?',a:'Yes',b:'No',correct:'a',explain:'Appraisal rights allow dissenters to petition for fair value determination in court, though procedures and success vary by state.'},
    {q:'Does seller financing increase or decrease the buyer\'s effective purchase price?',a:'Increase',b:'Decrease',correct:'a',explain:'Seller financing typically carries interest; the total cost (principal + interest) exceeds the headline price.'},
    {q:'In an asset sale vs. stock sale, does the buyer prefer asset or stock?',a:'Asset',b:'Stock',correct:'a',explain:'Buyers prefer assets for stepped-up basis and tax shields; sellers prefer stock sales for capital gains rates and simplicity.'},
    {q:'Does a reps and warranties insurance policy protect the buyer or seller?',a:'Buyer',b:'Seller',correct:'a',explain:'Reps insurance protects the buyer if seller breaches representations; it\'s funded by the seller (usually).'},
    {q:'In a tax-free reorganization, can the buyer use boot (cash) without triggering tax?',a:'Yes',b:'No',correct:'b',explain:'Tax-free reorganizations can include some boot, but if boot exceeds 25% of consideration, the reorganization is taxable.'},
    {q:'Does a "most favored nation" clause require the target to accept higher bids?',a:'Yes',b:'No',correct:'b',explain:'MFN clauses require buyers to match superior offers; they don\'t require targets to accept higher bids (target still has fiduciary duty).'},
    {q:'Are earnout periods typically 1-2 years, 3-5 years, or 10+ years?',a:'1-2 years',b:'3-5 years',correct:'b',explain:'Most earnouts last 3-5 years; longer periods create integration risk and increase buyer risk of non-achievement.'},
    {q:'In a merger of equals (MOE) structure, are shareholders of both companies diluted equally?',a:'Yes',b:'No',correct:'a',explain:'MOE deals typically grant equal ownership stakes to both companies\' shareholders; no premium is paid to either side.'},
    {q:'Does a "ticking fee" increase or decrease the buyer\'s willingness to close a deal?',a:'Increase',b:'Decrease',correct:'b',explain:'Ticking fees (rising seller proceeds if deal is delayed) incentivize buyer to close; they reduce buyer leverage.'},
    {q:'Are financial buyer (PE) deals typically more or less leveraged than strategic deals?',a:'More',b:'Less',correct:'a',explain:'PE buyers use 4-7x leverage to maximize returns; strategic buyers (corporates) are more conservative with debt.'},
    {q:'Does a "fiduciary out" clause allow the target to walk away from a merger?',a:'Yes',b:'No',correct:'a',explain:'Fiduciary outs permit target boards to accept superior offers and preserve their fiduciary duties to shareholders.'}
  ],
  lbo:[
    {q:'In a typical LBO, which makes up the LARGER portion of the purchase price?',a:'Debt (60-90%)',b:'Equity (10-40%)',correct:'a',explain:'PE firms typically finance 60-90% of an LBO with debt and contribute only 10-40% as equity, using leverage to amplify returns.'},
    {q:'Which is SENIOR in the capital structure (paid first in bankruptcy)?',a:'Senior secured debt',b:'Subordinated/mezzanine debt',correct:'a',explain:'Senior secured debt has first claim on assets in bankruptcy. Subordinated debt is junior and only paid after senior claims are satisfied.'},
    {q:'Which carries a HIGHER interest rate?',a:'Subordinated (junior) debt',b:'Senior secured debt',correct:'a',explain:'Subordinated debt is riskier (paid after senior debt in bankruptcy), so lenders demand a higher interest rate to compensate for the additional risk.'},
    {q:'More leverage in an LBO means _____ potential equity returns (if the company performs well).',a:'Higher',b:'Lower',correct:'a',explain:'With more debt, less equity is invested upfront. If the company generates strong cash flows and pays down debt, the equity value grows dramatically relative to the small initial investment.'},
    {q:'Which type of debt typically has FLOATING interest rates?',a:'Bank debt (term loans)',b:'High-yield bonds',correct:'a',explain:'Bank debt usually has floating rates tied to LIBOR/SOFR plus a spread. High-yield bonds typically have fixed coupon rates.'},
    {q:'A credit agreement is MOST restrictive in which type of debt?',a:'Senior secured bank debt',b:'High-yield bonds',correct:'a',explain:'Senior bank debt has strict covenants (financial maintenance tests, restricted payments). High-yield bonds have fewer covenants (incurrence-based), giving more operational flexibility.'},
    {q:'Which type of bond generally trades at a HIGHER price?',a:'Investment-grade bond',b:'High-yield (junk) bond',correct:'a',explain:'Investment-grade bonds are lower risk, so investors accept lower yields and pay higher prices. High-yield bonds must offer higher yields (lower prices) to compensate for default risk.'},
    {q:'In an LBO exit, which route typically provides the MOST liquidity?',a:'IPO',b:'Dividend recapitalization',correct:'a',explain:'An IPO provides access to public markets and potentially full exit. A dividend recap extracts some returns but the PE firm still owns the company.'},
    {q:'Debt/EBITDA ratio of 6.0x vs 3.0x — which company is MORE leveraged?',a:'6.0x Debt/EBITDA',b:'3.0x Debt/EBITDA',correct:'a',explain:'A higher Debt/EBITDA means more debt relative to cash generation. 6.0x means it would take 6 years of EBITDA to pay off all debt, indicating higher leverage and risk.'},
    {q:'Which is the FIRST source of LBO returns?',a:'Debt paydown from cash flows',b:'Revenue growth',correct:'a',explain:'The primary LBO return driver is using the company\'s cash flows to pay down debt, increasing equity value. Revenue growth and margin expansion are secondary drivers.'},
    {q:'In an LBO, is debt typically 60-70% of the total capitalization (leverage)?',a:'60-70%',b:'50%',correct:'a',explain:'Typical LBO leverage is 4-7x EBITDA, which translates to 60-80% of enterprise value in debt.'},
    {q:'Does a floating-rate debt instrument benefit the sponsor when rates rise or fall?',a:'Rise',b:'Fall',correct:'b',explain:'Floating rates increase when market rates rise; sponsors prefer rates to fall, reducing their interest costs.'},
    {q:'In a senior secured loan, does it have first or second priority to collateral?',a:'First',b:'Second',correct:'a',explain:'Senior debt has first lien on assets; subordinated debt is junior and recovers after senior debt is paid.'},
    {q:'Are bank loans (term loans) typically amortizing or bullet maturities?',a:'Amortizing',b:'Bullet',correct:'a',explain:'Bank term loans amortize over time (reducing leverage); bonds/high-yield may have bullet maturities (pay all at end).'},
    {q:'Does leverage increase or decrease the sponsor\'s equity return (IRR)?',a:'Increase',b:'Decrease',correct:'a',explain:'Leverage amplifies equity returns via debt proceeds deployed at higher ROI; returns are higher if ROIC > cost of debt.'},
    {q:'In an LBO, do sponsors typically distribute proceeds from debt refinancing to themselves?',a:'Yes',b:'No',correct:'a',explain:'Dividend recaps allow sponsors to extract returns early by refinancing debt; cash is distributed to sponsors before exit.'},
    {q:'Does a higher EBITDA conversion to free cash flow increase or decrease debt paydown?',a:'Increase',b:'Decrease',correct:'a',explain:'Higher FCF generation allows faster debt paydown, reducing leverage multiples and improving sponsor returns.'},
    {q:'Are restrictive covenants (leverage ratios, capex caps) tighter in bank debt or high-yield bonds?',a:'Bank debt',b:'High-yield bonds',correct:'a',explain:'Bank lenders impose strict covenants; high-yield bonds have looser covenants and are less restrictive.'},
    {q:'In a covenant-lite loan, does the lender have less or more flexibility to enforce?',a:'Less',b:'More',correct:'a',explain:'Cov-lite loans waive financial maintenance covenants; lenders have fewer enforcement triggers but higher pricing risk.'},
    {q:'Does an LBO acquire a company at higher or lower multiples than strategic buyers?',a:'Higher',b:'Lower',correct:'b',explain:'PE buyers are value buyers; they negotiate lower entry multiples to create margin for operational improvement and expansion at exit.'},
    {q:'In a dividend recapitalization, is new debt raised to pay dividends to sponsors or buy assets?',a:'Dividends',b:'Buy assets',correct:'a',explain:'Dividend recaps refinance debt to pull cash out for shareholder distributions; no asset purchase.'},
    {q:'Does increased leverage reduce or increase the risk of covenant violations?',a:'Reduce',b:'Increase',correct:'b',explain:'Higher leverage (debt/EBITDA) increases the risk that earnings downturns trigger covenant breaches.'},
    {q:'Are warrants in a leveraged buyout a claim on equity or debt?',a:'Equity',b:'Debt',correct:'a',explain:'Warrants give the lender the right to buy equity; they\'re an equity sweetener for lenders in higher-risk deals.'},
    {q:'In a stepped debt schedule, does debt increase or decrease over the hold period?',a:'Increase',b:'Decrease',correct:'b',explain:'Sponsors pay down debt during the hold period; a stepped schedule reduces mandatory amortization early on.'},
    {q:'Does the sponsor\'s ownership percentage increase or decrease if debt is paid down?',a:'Increase',b:'Decrease',correct:'a',explain:'If debt is repaid and no new equity is raised, the sponsor\'s ownership percentage increases (equity is amplified).'},
    {q:'Are revolving credit facilities typically used for capex or working capital financing?',a:'Capex',b:'Working capital',correct:'b',explain:'Revolver facilities provide liquidity for day-to-day working capital needs; term loans and bonds fund capex and acquisitions.'},
    {q:'In an LBO exit, does the sponsor prefer to sell to a strategic buyer or another PE firm?',a:'Strategic',b:'PE firm',correct:'a',explain:'Strategic buyers typically pay higher multiples (they extract synergies); PE buyers offer portfolio alignment but lower prices.'},
    {q:'Does a higher interest coverage ratio (EBITDA / interest expense) reduce or increase lender risk?',a:'Reduce',b:'Increase',correct:'a',explain:'Higher coverage means more cash available to service debt; lower coverage signals higher default risk.'},
    {q:'Are add-on acquisitions in an LBO platform financed by existing debt or new debt?',a:'Existing',b:'New debt',correct:'b',explain:'Add-ons are typically financed with new term loans; sponsors want to preserve debt capacity on the platform.'},
    {q:'Does a floorless LIBOR structure increase or decrease lender risk?',a:'Increase',b:'Decrease',correct:'a',explain:'No floor means if LIBOR drops, lender\'s rate drops too; a floor (e.g., 1% floor) protects lender from negative rates.'},
    {q:'In an LBO, does higher growth EBITDA increase or decrease the entry valuation multiple?',a:'Increase',b:'Decrease',correct:'a',explain:'Higher growth justifies premium multiples; sponsors pay more but expect faster deleveraging and higher exit returns.'},
    {q:'Are "key man" provisions in LBO debt typical or rare?',a:'Typical',b:'Rare',correct:'a',explain:'Key man clauses allow lenders to exit if the lead sponsor partner leaves; they\'re common in LBOs.'},
    {q:'Does a sponsor using a "stapled" equity commitment reduce or increase buyout risk?',a:'Reduce',b:'Increase',correct:'a',explain:'Stapled equity (sponsor commits equity alongside debt) signals sponsor confidence and reduces lender risk.'},
    {q:'In a high-yield bond LBO, are the bonds typically issued at par or at a discount?',a:'Par',b:'Discount',correct:'b',explain:'High-yield bonds often price below par (issue discount); they offer higher yields to compensate for credit risk.'},
    {q:'Does the weighted average life (WAL) of debt increase with amortization or bullet maturities?',a:'Amortization',b:'Bullet',correct:'b',explain:'Bullet debt has longer WAL because principal isn\'t paid until maturity; amortizing debt reduces WAL faster.'},
    {q:'Are phantom equity plans used to incentivize management before or after an LBO?',a:'Before',b:'After',correct:'b',explain:'Phantom equity is awarded post-acquisition to align management interests; existing shareholders might roll equity.'},
    {q:'In a debt paydown waterfall, are taxes or debt service paid first?',a:'Taxes',b:'Debt service',correct:'a',explain:'Sponsors must pay taxes on operating income first; remaining cash pays debt, capex, and working capital.'},
    {q:'Does a high-yield bond issuance ("lever-up") increase or decrease the cost of equity?',a:'Increase',b:'Decrease',correct:'a',explain:'More leverage raises equity beta and financial risk, increasing the cost of equity for existing shareholders.'},
    {q:'Are seller notes in an LBO subordinated to bank debt or pari passu (equal)?',a:'Subordinated',b:'Pari passu',correct:'a',explain:'Seller notes are typically subordinated; they get paid after senior bank debt is retired.'},
    {q:'In a stub equity scenario, does the sponsor\'s return depend more on debt paydown or EBITDA multiple expansion?',a:'Debt paydown',b:'Multiple expansion',correct:'a',explain:'Stub equity (minimal upfront equity) requires debt paydown for return; growth/multiple expansion is secondary.'},
    {q:'Does the debt/EBITDA covenant reset upward after add-on acquisitions?',a:'Yes',b:'No',correct:'a',explain:'Add-on acquisitions typically trigger temporary covenant adjustments or waivers to allow for integration-related leverage spikes.'},
    {q:'Are the sponsor\'s management fees (3-5% of fund AUM) paid from the acquisition entity or the fund?',a:'Acquisition entity',b:'Fund',correct:'b',explain:'Management fees come from the PE fund, not the portfolio company; they\'re paid by the fund to cover operating expenses.'},
    {q:'Does a "pay-to-play" provision force sponsors to invest additional equity to maintain ownership?',a:'Yes',b:'No',correct:'a',explain:'Pay-to-play clauses require sponsors to fund additional capital calls; failure means dilution of ownership percentage.'},
    {q:'In leverage-adjusted returns, does higher entry leverage or faster deleveraging drive sponsor returns?',a:'Higher entry',b:'Faster deleveraging',correct:'b',explain:'Sponsors generate IRR from both entry multiples and deleveraging; faster debt paydown (from strong cash gen) is the primary driver.'},
    {q:'Are committed vs. flex debt facilities different in availability or pricing?',a:'Availability',b:'Pricing',correct:'a',explain:'Committed debt is guaranteed; flex debt has "flex" provisions allowing the lender to adjust terms or reduce availability.'},
    {q:'Does the sponsor typically aim for 2.5x or 5x leverage at exit?',a:'2.5x',b:'5x',correct:'a',explain:'Sponsors target 2.5-3.5x leverage at exit (lower than entry) to show deleveraging and reduce exit risk for buyers.'},
    {q:'In a management rollover, does management receive common or preferred equity?',a:'Common',b:'Preferred',correct:'a',explain:'Management rollovers are common equity to align with sponsors; preferred equity is reserved for outside investors.'},
    {q:'Does a sponsor prefer debt with step-ups (increasing interest rates) or flat rates?',a:'Step-ups',b:'Flat rates',correct:'b',explain:'Sponsors dislike step-ups because they increase future costs; flat rates allow them to plan and deleverage predictably.'},
    {q:'Are cross-default provisions in LBO debt common or rare?',a:'Common',b:'Rare',correct:'a',explain:'Cross-default clauses trigger default across all debt if one facility defaults; they\'re standard in LBOs.'},
    {q:'Does a "most favored lender" clause limit the company\'s flexibility or lender rights?',a:'Company',b:'Lender',correct:'a',explain:'MFN clauses require the borrower to pay all lenders the best rate offered; they limit company flexibility in refinancing.'}
  ],
  fs:[
    {q:'Which financial statement has the equation Assets = Liabilities + Equity?',a:'Balance Sheet',b:'Income Statement',correct:'a',explain:'The Balance Sheet is built on the fundamental accounting equation: Assets = Liabilities + Shareholders\' Equity, and it must always balance.'},
    {q:'On the Cash Flow Statement, depreciation is:',a:'Added back (non-cash expense)',b:'Subtracted (cash outflow)',correct:'a',explain:'Depreciation is a non-cash expense that reduced Net Income but did not use actual cash. It is added back in Cash From Operations to reflect true cash generation.'},
    {q:'Which cash flow section typically has the LARGEST positive number for a mature company?',a:'Cash from Operations (CFO)',b:'Cash from Investing (CFI)',correct:'a',explain:'Mature companies generate strong operating cash flows. Investing activities are typically negative (capex), and financing activities vary. CFO is the primary cash generator.'},
    {q:'$10 of depreciation expense reduces net income by:',a:'$10 × (1 - Tax Rate)',b:'$10',correct:'a',explain:'Depreciation is tax-deductible. With a 25% tax rate, $10 depreciation reduces pre-tax income by $10 but net income only by $7.50 (because of $2.50 tax savings).'},
    {q:'Net Income is the STARTING line item on which statement?',a:'Cash Flow Statement',b:'Balance Sheet',correct:'a',explain:'The Cash Flow Statement starts with Net Income and adjusts for non-cash items and working capital changes to arrive at actual cash generated.'},
    {q:'Which balance sheet item drives Interest Expense on the Income Statement?',a:'Debt outstanding',b:'Cash balance',correct:'a',explain:'Interest Expense is calculated based on the debt balance on the Balance Sheet. More debt means more interest expense, which reduces pre-tax income.'},
    {q:'Which links the Income Statement to the Balance Sheet?',a:'Retained Earnings',b:'Accounts Receivable',correct:'a',explain:'Net Income from the Income Statement flows into Retained Earnings (minus dividends paid) on the Balance Sheet, creating the direct link between the two statements.'},
    {q:'Capital Expenditures (CapEx) appear on which section of the Cash Flow Statement?',a:'Cash from Investing',b:'Cash from Operations',correct:'a',explain:'CapEx (purchases of PP&E and other long-term assets) is an investing activity. It appears as a cash outflow in Cash from Investing Activities.'},
    {q:'Which typically has a LONGER filing deadline with the SEC?',a:'10-K (60-90 days)',b:'10-Q (40-45 days)',correct:'a',explain:'The 10-K annual report requires more comprehensive auditing and has a longer deadline (60-90 days after fiscal year end) compared to the 10-Q quarterly report (40-45 days).'},
    {q:'Negative working capital is:',a:'Not necessarily bad (can improve cash flow)',b:'Always a sign of financial distress',correct:'a',explain:'Negative working capital can be positive — companies like Amazon stretch vendor payment terms, collecting cash from customers before paying suppliers. This actually improves cash efficiency.'},
    {q:'On the balance sheet, is the retained earnings balance a snapshot or cumulative?',a:'Snapshot',b:'Cumulative',correct:'b',explain:'Retained earnings is the cumulative sum of all net income and dividends since inception; it\'s not reset annually.'},
    {q:'In the cash flow statement, does a decrease in accounts payable increase or decrease CFO?',a:'Increase',b:'Decrease',correct:'b',explain:'Decrease in AP means cash was paid out to suppliers; this is a use of cash, reducing operating cash flow.'},
    {q:'On the income statement, which is higher: gross profit or operating income?',a:'Gross profit',b:'Operating income',correct:'a',explain:'Gross profit = Revenue - COGS; operating income deducts SG&A and R&D, so it\'s lower than gross profit.'},
    {q:'Does depreciation on fixed assets reduce net income or only balance sheet assets?',a:'Net income',b:'Balance sheet only',correct:'a',explain:'Depreciation is an IS expense that reduces net income; it also reduces the net value of assets on the BS.'},
    {q:'When a company receives a customer advance payment, where does it appear initially?',a:'Revenue',b:'Deferred revenue liability',correct:'b',explain:'Cash received before performance is a liability (deferred revenue); it converts to revenue as services are delivered.'},
    {q:'On a multi-step income statement, does cost of goods sold appear above or below operating expenses?',a:'Above',b:'Below',correct:'a',explain:'COGS comes before operating expenses (SG&A, R&D) in the income statement waterfall.'},
    {q:'Does a company\'s book value of equity equal its market capitalization?',a:'Yes',b:'No',correct:'b',explain:'Book value is historical asset cost minus liabilities; market cap reflects investor expectations of future earnings and growth.'},
    {q:'In the statement of cash flows, is capital expenditure a source or use of cash?',a:'Source',b:'Use',correct:'b',explain:'Capex is an investing activity and a use of cash; it reduces cash available for other purposes.'},
    {q:'Does the balance sheet equation (Assets = Liabilities + Equity) hold after net income is earned?',a:'Yes',b:'No',correct:'a',explain:'Yes; retained earnings (equity component) increases by net income, maintaining the equation balance.'},
    {q:'When accounts receivable increases from $20M to $30M, how does this impact cash flow?',a:'Increases CFO',b:'Decreases CFO',correct:'b',explain:'Higher AR ties up more cash; the increase in AR is a use of cash, reducing operating cash flow.'},
    {q:'On the cash flow statement, is net income adjusted for non-cash items like depreciation?',a:'Yes',b:'No',correct:'a',explain:'Yes; depreciation is added back to net income when calculating CFO because it\'s a non-cash expense.'},
    {q:'Does the income statement reflect accrual or cash basis accounting?',a:'Accrual',b:'Cash',correct:'a',explain:'GAAP requires accrual accounting; revenue and expenses are recognized when earned/incurred, not when cash moves.'},
    {q:'When a company issues stock, does this increase equity on the balance sheet?',a:'Yes',b:'No',correct:'a',explain:'Issuing stock raises cash and increases common stock (and paid-in capital); total equity increases.'},
    {q:'Does an increase in inventory increase or decrease the company\'s free cash flow?',a:'Increase',b:'Decrease',correct:'b',explain:'Increasing inventory ties up cash; the change is a use of cash and reduces free cash flow.'},
    {q:'On the balance sheet, is goodwill classified as current or non-current?',a:'Current',b:'Non-current',correct:'b',explain:'Goodwill is an intangible asset with indefinite life (unless impaired); it\'s always non-current.'},
    {q:'Does amortization of an intangible asset reduce net income like depreciation?',a:'Yes',b:'No',correct:'a',explain:'Amortization is a non-cash expense just like depreciation; it reduces net income on the income statement.'},
    {q:'In the cash flow statement, is interest paid included in CFO or CFI?',a:'CFO',b:'CFI',correct:'a',explain:'Interest paid is an operating activity and reduces cash from operations; dividends are also in CFO.'},
    {q:'Does the 10-Q filing require audited or unaudited financial statements?',a:'Audited',b:'Unaudited',correct:'b',explain:'10-Qs are unaudited quarterly statements; 10-Ks are audited annual statements.'},
    {q:'When a company accrues a liability but hasn\'t paid yet, does this affect cash flow?',a:'Yes',b:'No',correct:'b',explain:'Accrued liabilities reduce net income and don\'t directly affect cash; the cash impact occurs when actually paid.'},
    {q:'On the balance sheet, does a company show total debt or net debt (debt minus cash)?',a:'Total debt',b:'Net debt',correct:'a',explain:'The balance sheet shows gross debt (current and long-term); net debt is calculated by subtracting cash.'},
    {q:'Does the weighted average number of shares outstanding include treasury stock?',a:'Yes',b:'No',correct:'b',explain:'Treasury shares are excluded from weighted average shares; they don\'t vote and don\'t receive dividends.'},
    {q:'In the cash flow statement, does the sale of fixed assets appear in CFO or CFI?',a:'CFO',b:'CFI',correct:'b',explain:'Asset sales are investing activities; the gain/loss is included in net income but cash received is in CFI.'},
    {q:'Does the income statement or balance sheet report stockholder\'s equity?',a:'Income statement',b:'Balance sheet',correct:'b',explain:'Stockholders\' equity is reported on the balance sheet; the income statement shows the components that change equity (net income).'},
    {q:'When a company repurchases its own stock, does this increase or decrease equity?',a:'Increase',b:'Decrease',correct:'b',explain:'Buybacks reduce cash (a use of cash) and reduce equity via treasury stock; total equity decreases.'},
    {q:'Does the change in deferred tax assets/liabilities affect the tax rate shown in the income statement?',a:'Yes',b:'No',correct:'a',explain:'Deferred tax changes create differences between book and tax income; they affect the effective tax rate.'},
    {q:'In a classified balance sheet, are assets due in 10 years classified as current or non-current?',a:'Current',b:'Non-current',correct:'b',explain:'Current assets/liabilities are due within 12 months; assets due in 10 years are non-current.'},
    {q:'Does a company\'s cash conversion cycle measure working capital efficiency?',a:'Yes',b:'No',correct:'a',explain:'CCC = Days Inventory + DSO - DPO; it measures how quickly a company converts inventory and receivables into cash.'},
    {q:'When a subsidiary is consolidated, does the parent show 100% of assets and liabilities?',a:'Yes',b:'No',correct:'a',explain:'Consolidated statements include 100% of subsidiary assets/liabilities and show non-controlling interest separately.'},
    {q:'Does interest income from investments appear on the income statement or cash flow statement?',a:'Income statement',b:'Cash flow statement',correct:'a',explain:'Interest income is recognized on the IS; the cash receipt is shown in CFI (investing) or CFO depending on nature.'},
    {q:'On the balance sheet, is land recorded at cost and depreciated like buildings?',a:'Yes',b:'No',correct:'b',explain:'Land is capitalized at cost but NOT depreciated (indefinite life); buildings are depreciated over useful life.'},
    {q:'Does operating cash flow or net income better reflect sustainable earnings?',a:'Operating cash flow',b:'Net income',correct:'a',explain:'CFO reflects actual cash generated; net income includes non-cash charges and can be distorted by accounting choices.'},
    {q:'When preparing consolidated financial statements, is the parent\'s investment in subsidiary eliminated?',a:'Yes',b:'No',correct:'a',explain:'In consolidation, the parent\'s investment in subsidiary equity is eliminated to avoid double-counting.'},
    {q:'Does the statement of shareholders\' equity reconcile beginning to ending equity?',a:'Yes',b:'No',correct:'a',explain:'The equity statement shows net income, dividends, and share issuances/buybacks that reconcile opening and closing equity.'},
    {q:'In a 10-K, are segment results required to be disclosed separately?',a:'Yes',b:'No',correct:'a',explain:'FASB requires segment revenue, operating profit, and assets to be disclosed if the segment is reportable.'},
    {q:'Does a provision (e.g., warranty reserve) reduce net income or only the balance sheet?',a:'Net income',b:'Balance sheet only',correct:'a',explain:'Provisions are accrued as expenses on the IS, reducing net income and creating a liability on the BS.'},
    {q:'When a company impairs goodwill, is this a cash or non-cash charge?',a:'Cash',b:'Non-cash',correct:'b',explain:'Goodwill impairment is a non-cash write-down of an asset; it reduces net income but not cash flow.'},
    {q:'Does the balance sheet report current liabilities in order of due date or magnitude?',a:'Due date',b:'Magnitude',correct:'a',explain:'Current liabilities are typically ordered by due date (accounts payable, accruals, then current portion of debt).'},
    {q:'In the cash flow statement, does a loss on asset sale increase or decrease CFO?',a:'Increase',b:'Decrease',correct:'a',explain:'Losses are non-cash and are added back to net income when calculating CFO; the cash proceeds adjust CFI.'},
    {q:'Does a company with negative retained earnings have insolvency or just past losses?',a:'Insolvency',b:'Past losses',correct:'b',explain:'Negative retained earnings reflect cumulative losses exceeding prior profits; the company may still be solvent if assets exceed liabilities.'},
    {q:'Which inventory method results in HIGHER COGS during inflation?',a:'LIFO',b:'FIFO',correct:'a',explain:'Under LIFO, the most recently purchased (higher-cost) inventory is expensed first, resulting in higher COGS and lower net income during inflationary periods.'}
