<style>
@import url('https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;500;600;700;800&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FAFAF7;--text:#1A1A1A;--text2:#787878;--border:#E2E0DC;
  --tile-bg:#EFEFE6;--tile-hover:#DDDDD4;--tile-sel:#5A594E;--tile-sel-t:#FFF;
  --yellow:#F9DF6D;--green:#A0C35A;--blue:#B0C4EF;--purple:#BA81C5;
  --btn-bg:#1A1A1A;--btn-t:#FFF;--btn-dis:#A0A0A0;
  --gold-medal:#D4A853;--silver-medal:#A8A8A8;--bronze-medal:#CD7F32;
  --mw:600px;
  --accent:#6C5AB7;--accent-light:#F0ECF9;
}
html{height:100%}
body{font-family:'Libre Franklin',sans-serif;background:var(--bg);color:var(--text);min-height:100%;-webkit-tap-highlight-color:transparent}

.page{display:none}.page.active{display:flex;flex-direction:column}

/* ══ MAIN HOME ══ */
#main-home{align-items:center;min-height:100vh;padding:48px 20px 40px}
.mh-title{font-size:36px;font-weight:800;letter-spacing:-1px;margin-bottom:4px;text-align:center}
.mh-sub{font-size:15px;color:var(--text2);margin-bottom:36px;text-align:center}
.mh-games{width:100%;max-width:520px;display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:48px}
.mh-card{display:flex;flex-direction:column;align-items:center;justify-content:center;aspect-ratio:1;padding:20px 12px;border-radius:20px;cursor:pointer;transition:background .15s,border-color .15s,transform .12s,box-shadow .15s;text-align:center;background:#FFF;border:1.5px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.04)}
.mh-card:hover{background:#FAFAFA;border-color:#CCC;transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.08)}
.mh-card:active{transform:translateY(0);box-shadow:0 2px 8px rgba(0,0,0,.04)}
.mh-card.disabled{opacity:.4;cursor:default;pointer-events:none}
.mh-card-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#FFF;margin-bottom:12px;letter-spacing:.5px}
.mh-card-name{font-size:15px;font-weight:700;margin-bottom:3px}
.mh-card-desc{font-size:11px;color:var(--text2);font-weight:400;line-height:1.4}
.mh-card-tag{font-size:10px;font-weight:600;color:var(--text2);background:#F0F0F0;padding:3px 10px;border-radius:6px;margin-top:8px}
.mh-divider{width:100%;max-width:660px;height:1px;background:var(--border);margin-bottom:32px}

/* ══ ACHIEVEMENTS ══ */
.ach-section{width:100%;max-width:660px}
.ach-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.ach-title{font-size:20px;font-weight:800}
.ach-count{font-size:13px;color:var(--text2);font-weight:600}
.ach-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.ach-card{display:flex;flex-direction:column;align-items:center;text-align:center;padding:16px 8px 12px;border:1.5px solid var(--border);border-radius:12px;transition:border-color .15s;cursor:pointer}
.ach-card:hover{border-color:#BBB;background:#FAFAFA}
.ach-card.earned{border-color:#D4A853;background:rgba(212,168,83,0.04)}
.ach-card.earned:hover{border-color:#B8922E;background:rgba(212,168,83,0.08)}

/* Achievement Popup */
.ach-popup-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;padding:20px}
.ach-popup-overlay.active{display:flex}
.ach-popup{background:#FFF;border-radius:16px;padding:28px 24px 24px;max-width:320px;width:100%;text-align:center;animation:fadeUp .3s ease;box-shadow:0 12px 40px rgba(0,0,0,.15)}
.ach-popup-shield{margin-bottom:12px}
.ach-popup-shield svg{width:72px;height:72px}
.ach-popup-name{font-size:18px;font-weight:800;margin-bottom:6px}
.ach-popup-desc{font-size:14px;color:var(--text2);margin-bottom:6px;line-height:1.5}
.ach-popup-status{font-size:13px;font-weight:600;margin-bottom:18px}
.ach-popup-status.earned-status{color:#B8922E}
.ach-popup-status.locked-status{color:var(--text2)}
.ach-popup-close{font-family:'Libre Franklin',sans-serif;font-size:14px;font-weight:600;padding:10px 32px;border-radius:20px;background:var(--btn-bg);color:var(--btn-t);border:none;cursor:pointer;transition:background .12s}
.ach-popup-close:hover{background:#333}
.ach-shield{width:48px;height:48px;position:relative;margin-bottom:8px}
.ach-shield svg{width:48px;height:48px}
.ach-shield-fill{fill:#E8E8E8}
.ach-shield-border{fill:#CCCCCC}
.ach-card.earned .ach-shield-fill{fill:var(--gold-medal)}
.ach-card.earned .ach-shield-border{fill:#B8922E}
.ach-card.earned.silver .ach-shield-fill{fill:var(--silver-medal)}
.ach-card.earned.silver .ach-shield-border{fill:#888}
.ach-card.earned.bronze .ach-shield-fill{fill:var(--bronze-medal)}
.ach-card.earned.bronze .ach-shield-border{fill:#9A6520}
.ach-name{font-size:11px;font-weight:700;line-height:1.3}
.ach-desc{font-size:10px;color:var(--text2);margin-top:2px;line-height:1.3}

/* ══ SHARED UI ELEMENTS ══ */
.int-feedback{width:100%;max-width:var(--mw);text-align:center;font-size:14px;font-weight:600;margin-bottom:12px;min-height:22px}
.int-feedback.correct-fb{color:#4CAF50}
.int-feedback.wrong-fb{color:#E53935}
.int-feedback.reveal-fb{color:var(--text)}
.int-submit{font-family:'Libre Franklin',sans-serif;font-size:15px;font-weight:700;padding:14px 28px;border-radius:12px;background:var(--btn-bg);color:var(--btn-t);border:none;cursor:pointer;transition:background .12s;white-space:nowrap}
.int-submit:hover{background:#333}
.int-submit:disabled{background:var(--btn-dis);cursor:default}
.int-next-btn{font-family:'Libre Franklin',sans-serif;font-size:15px;font-weight:700;padding:12px 32px;border-radius:24px;background:var(--btn-bg);color:var(--btn-t);border:none;cursor:pointer;transition:background .12s;margin-top:8px}
.int-next-btn:hover{background:#333}
.int-go-score{font-size:48px;font-weight:800;margin-bottom:8px}
.int-go-breakdown{display:flex;gap:8px;justify-content:center;margin-bottom:24px}
.int-round-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#FFF;background:var(--border)}
.int-round-dot.pts3{background:var(--purple)}.int-round-dot.pts2{background:var(--blue)}.int-round-dot.pts1{background:var(--green)}.int-round-dot.pts0{background:#CCC;color:var(--text2)}
.int-round-dot.current{border:2px solid var(--text);background:var(--bg);color:var(--text)}
.int-round-dots{display:flex;gap:6px}

/* ══ ON-SCREEN KEYBOARD ══ */
.vkb{width:100%;max-width:500px;margin:0 auto;padding:0 2px;user-select:none;-webkit-user-select:none}
.vkb-row{display:flex;justify-content:center;gap:5px;margin-bottom:6px}
.vkb-key{font-family:'Libre Franklin',sans-serif;height:52px;min-width:32px;flex:1;max-width:44px;border:none;border-radius:6px;background:#D3D6DA;font-size:16px;font-weight:700;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .1s;-webkit-tap-highlight-color:transparent;padding:0}
.vkb-key:active{background:#B0B3B8}
.vkb-key.wide{min-width:56px;max-width:72px;font-size:12px;letter-spacing:.5px}
.vkb-key.disabled{opacity:.3;pointer-events:none}
@media(max-width:380px){.vkb-key{height:46px;font-size:14px;min-width:26px}.vkb-key.wide{min-width:48px;font-size:11px}}

/* ══ HIGHER OR LOWER GAME ══ */
#hl-home{align-items:center;min-height:100vh;padding:20px 20px 40px}
#hl-game{align-items:center;min-height:100vh;padding:0 16px 30px}
.hl-question{width:100%;max-width:var(--mw);font-size:18px;font-weight:700;text-align:center;margin-bottom:24px;line-height:1.5}
.hl-cards{width:100%;max-width:var(--mw);display:flex;gap:16px;margin-bottom:20px}
.hl-card{flex:1;border:2px solid var(--border);border-radius:12px;padding:24px 16px;min-height:160px;cursor:pointer;transition:border-color .15s,background .15s,transform .12s;display:flex;align-items:center;justify-content:center;background:#FFF}
.hl-card:hover{border-color:#BBB;transform:translateY(-2px)}
.hl-card:active{transform:translateY(0)}
.hl-card.selected{border-color:var(--accent);background:rgba(108,90,183,.08)}
.hl-card.correct{border-color:#4CAF50;background:rgba(76,175,80,.1)}
.hl-card.wrong{border-color:#E53935;background:rgba(229,57,53,.1)}
.hl-card-text{font-size:16px;font-weight:700;text-align:center}
.hl-streak{font-size:18px;font-weight:700;text-align:center;margin-bottom:16px}
.hl-progress{display:flex;gap:6px;justify-content:center;margin-bottom:16px}
.hl-explain{width:100%;max-width:var(--mw);font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:16px;padding:12px;background:#F5F5F5;border-radius:8px}
@media(max-width:660px){.hl-cards{gap:10px}.hl-card{min-height:120px;padding:18px 12px}.hl-card-text{font-size:14px}}

/* ══ REVIEW CAROUSEL ══ */
.hl-review{width:100%;max-width:420px;margin:0 auto}
.hl-review-counter{font-size:13px;color:var(--text2);font-weight:600;margin-bottom:12px}
.hl-review-track{position:relative;overflow:hidden;touch-action:pan-y}
.hl-review-card{text-align:left;padding:20px;border-radius:12px;border:1.5px solid var(--border);background:#FFF;min-height:200px}
.hl-review-card.correct-card{border-color:#4CAF50;background:rgba(76,175,80,.04)}
.hl-review-card.wrong-card{border-color:#E53935;background:rgba(229,57,53,.04)}
.hl-review-q{font-size:15px;font-weight:700;margin-bottom:12px;line-height:1.5;color:var(--text)}
.hl-review-badge{display:inline-block;font-size:12px;font-weight:700;padding:3px 10px;border-radius:12px;margin-bottom:10px}
.hl-review-badge.correct-badge{background:rgba(76,175,80,.12);color:#2E7D32}
.hl-review-badge.wrong-badge{background:rgba(229,57,53,.12);color:#C62828}
.hl-review-pick{font-size:13px;margin-bottom:6px;color:var(--text)}
.hl-review-answer{font-size:13px;margin-bottom:10px;color:var(--text);font-weight:600}
.hl-review-explain{font-size:12px;color:var(--text2);line-height:1.6;padding-top:10px;border-top:1px solid var(--border)}
.hl-review-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px}
.hl-review-arrow{font-family:'Libre Franklin',sans-serif;width:40px;height:40px;border-radius:50%;border:1.5px solid var(--border);background:#FFF;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .12s,border-color .12s;color:var(--text)}
.hl-review-arrow:hover{background:#F5F5F5;border-color:#BBB}
.hl-review-arrow:disabled{opacity:.3;cursor:default;pointer-events:none}
.hl-review-dots{display:flex;gap:6px}
.hl-review-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:background .2s}
.hl-review-dot.active{background:var(--text)}

/* ══ TOPIC ICONS ══ */
.topic-icon{width:28px;height:28px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-radius:7px}

/* ══ CONNECTIONS HOME ══ */
#conn-home{align-items:center;min-height:100vh;padding:20px 20px 40px}
.ch-header{width:100%;max-width:var(--mw);display:flex;align-items:center;padding:16px 0;border-bottom:1.5px solid var(--border);margin-bottom:24px}
.ch-back{font-family:'Libre Franklin',sans-serif;font-size:14px;font-weight:600;color:var(--text);background:none;border:none;cursor:pointer;padding:8px 0;display:flex;align-items:center;gap:6px}
.ch-back:hover{color:var(--text2)}
.ch-title-area{flex:1;text-align:center}
.ch-title{font-size:24px;font-weight:800}
.ch-spacer{width:60px}
.topic-list{width:100%;max-width:var(--mw);display:flex;flex-direction:column;gap:10px}
.topic-card{display:flex;align-items:center;padding:16px 18px;border:1.5px solid var(--border);border-radius:12px;transition:background .15s,border-color .15s}
.topic-card:hover{background:#FAFAFA;border-color:#CCC}
.topic-card-left{flex:1;cursor:pointer;display:flex;align-items:center;gap:12px}
.topic-card-medal{width:28px;height:28px;flex-shrink:0}
.topic-card-medal svg{width:28px;height:28px}
.topic-card-info{display:flex;flex-direction:column;gap:1px}
.topic-card-name{font-size:16px;font-weight:700}
.topic-card-stats{font-size:11px;color:var(--text2)}
.topic-card-right{display:flex;align-items:center;gap:10px}
.topic-dots{display:flex;gap:3px}
.topic-dot{width:8px;height:8px;border-radius:50%}
.topic-refresh{font-family:'Libre Franklin',sans-serif;width:34px;height:34px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .12s,border-color .12s;font-size:16px;color:var(--text2)}
.topic-refresh:hover{background:#F0F0F0;border-color:#BBB}
.topic-refresh.locked{opacity:.3;cursor:default;pointer-events:none}
.topic-play{font-family:'Libre Franklin',sans-serif;font-size:13px;font-weight:600;padding:8px 18px;border-radius:20px;background:var(--btn-bg);color:var(--btn-t);border:none;cursor:pointer;transition:background .12s}
.topic-play:hover{background:#333}

/* ══ GAME PAGE ══ */
#game-page{align-items:center;min-height:100vh;padding:0 16px 30px}
.game-header{width:100%;max-width:var(--mw);display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1.5px solid var(--border);margin-bottom:20px}
.back-btn{font-family:'Libre Franklin',sans-serif;font-size:14px;font-weight:600;color:var(--text);background:none;border:none;cursor:pointer;padding:8px 0;display:flex;align-items:center;gap:6px}
.back-btn:hover{color:var(--text2)}
.game-title{font-size:18px;font-weight:700;text-align:center}
.game-header-spacer{width:60px}
.game-instructions{font-size:15px;color:var(--text);margin-bottom:20px;text-align:center;font-weight:500}

.solved-area{width:100%;max-width:var(--mw);display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
.solved-group{border-radius:10px;padding:14px 16px;text-align:center;animation:groupReveal .4s ease}
@keyframes groupReveal{0%{opacity:0;transform:scaleY(.6)}100%{opacity:1;transform:scaleY(1)}}
.solved-group-name{font-size:15px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;color:var(--text)}
.solved-group-words{font-size:13px;font-weight:500;color:var(--text)}
.solved-group.yellow{background:var(--yellow)}.solved-group.green{background:var(--green)}
.solved-group.blue{background:var(--blue)}.solved-group.purple{background:var(--purple)}

.grid-area{width:100%;max-width:var(--mw)}
.tile-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
.tile{height:72px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:13px;font-weight:700;text-transform:uppercase;background:var(--tile-bg);border-radius:8px;cursor:pointer;transition:background .12s,color .12s,transform .12s;user-select:none;padding:6px 4px;line-height:1.2;letter-spacing:.2px;overflow:hidden;word-break:keep-all;overflow-wrap:break-word;white-space:normal}
.tile:hover{background:var(--tile-hover)}.tile:active{transform:scale(.96)}
.tile.selected{background:var(--tile-sel);color:var(--tile-sel-t)}.tile.selected:hover{background:#4A493E}
.tile.shake{animation:tileShake .4s ease}
@keyframes tileShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.tile.bounce{animation:tileBounce .4s ease}
@keyframes tileBounce{0%{transform:translateY(0)}30%{transform:translateY(-10px)}60%{transform:translateY(2px)}100%{transform:translateY(0)}}

.mistakes-area{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:20px;font-size:14px;font-weight:500;color:var(--text)}
.mistakes-dots{display:flex;gap:6px}
.mistake-dot{width:14px;height:14px;border-radius:50%;background:var(--tile-sel);transition:background .3s,transform .3s}
.mistake-dot.used{background:var(--border);transform:scale(.8)}

.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.game-btn{font-family:'Libre Franklin',sans-serif;font-size:15px;font-weight:600;padding:12px 24px;border-radius:24px;cursor:pointer;transition:background .12s,color .12s,border-color .12s;border:1.5px solid var(--btn-bg);background:var(--bg);color:var(--text)}
.game-btn:hover{background:#F5F5F5}.game-btn:active{transform:scale(.97)}
.game-btn.primary{background:var(--btn-bg);color:var(--btn-t);border-color:var(--btn-bg)}.game-btn.primary:hover{background:#333;border-color:#333}
.game-btn:disabled{border-color:var(--btn-dis);color:var(--btn-dis);cursor:default;background:var(--bg)}.game-btn:disabled:hover{background:var(--bg)}
.game-btn.primary:disabled{background:var(--btn-dis);border-color:var(--btn-dis);color:#FFF}

.go-overlay{display:none;position:fixed;inset:0;background:rgba(255,255,255,.94);z-index:100;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.go-overlay.active{display:flex}
.go-box{text-align:center;max-width:400px;width:100%;animation:fadeUp .4s ease}
@keyframes fadeUp{0%{opacity:0;transform:translateY(20px)}100%{opacity:1;transform:translateY(0)}}
.go-title{font-size:28px;font-weight:800;margin-bottom:8px}
.go-sub{font-size:15px;color:var(--text2);margin-bottom:24px;font-weight:400;line-height:1.5}
.go-medal-display{margin-bottom:20px}
.go-medal-display svg{width:64px;height:64px}
.go-results{display:flex;flex-direction:column;gap:6px;margin-bottom:28px}
.go-row{border-radius:8px;padding:12px 16px;text-align:center}
.go-row-name{font-size:14px;font-weight:800;text-transform:uppercase;color:var(--text);letter-spacing:.3px;margin-bottom:2px}
.go-row-words{font-size:12px;font-weight:500;color:var(--text)}
.go-btns{display:flex;flex-direction:column;gap:10px;align-items:center}
.go-btn{font-family:'Libre Franklin',sans-serif;font-size:16px;font-weight:700;padding:14px 40px;border-radius:28px;background:var(--btn-bg);color:var(--btn-t);border:none;cursor:pointer;transition:background .12s;min-width:220px}
.go-btn:hover{background:#333}
.go-btn.outline{background:var(--bg);color:var(--text);border:1.5px solid var(--btn-bg)}.go-btn.outline:hover{background:#F5F5F5}

.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 24px;border-radius:8px;font-size:14px;font-weight:600;z-index:90;opacity:0;pointer-events:none;transition:opacity .2s;white-space:nowrap}
.toast.visible{opacity:1}

/* ══ CROSSWORD GAME ══ */
#cross-home{align-items:center;min-height:100vh;padding:20px 20px 40px}
#cross-game{align-items:center;min-height:100vh;padding:0 16px 30px}
.cross-grid{display:grid;grid-template-columns:repeat(5,56px);gap:0;margin:20px auto;width:fit-content;border:2px solid #1A1A1A}
.cross-cell{width:56px;height:56px;border:1.5px solid #999;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;text-transform:uppercase;background:#FFF;cursor:pointer;transition:background .1s,border-color .1s;position:relative;flex-direction:column}
.cross-cell.black{background:#1A1A1A;border-color:#1A1A1A;cursor:default}
.cross-cell.selected{background:rgba(108,90,183,.25);border-color:#6C5AB7}
.cross-cell.highlighted{background:rgba(176,196,239,.35)}
.cross-cell.correct{background:rgba(76,175,80,.15);border-color:#4CAF50}
.cross-cell.wrong{background:rgba(229,57,53,.12);border-color:#E53935}
.cross-cell.wrong .cross-cell-letter{color:#E53935}
.cross-cell-num{position:absolute;top:2px;left:2px;font-size:9px;font-weight:700;color:var(--text);line-height:1}
.cross-cell-letter{font-size:20px;font-weight:700;text-transform:uppercase}
.cross-clues{width:100%;max-width:var(--mw);display:flex;gap:20px;margin:20px auto;justify-content:center;flex-wrap:wrap}
.cross-clues-section{flex:1;min-width:140px}
.cross-clues-title{font-size:12px;font-weight:800;margin-bottom:10px;text-transform:uppercase;color:var(--text2);letter-spacing:.5px}
.cross-clue{font-size:12px;margin-bottom:8px;line-height:1.4;cursor:pointer;padding:4px 6px;border-radius:4px;transition:background .1s}
.cross-clue:hover{background:rgba(0,0,0,.05)}
.cross-clue.active{background:var(--accent-light);border-radius:4px}
.cross-clue-num{font-weight:700;margin-right:4px}

@media(max-width:660px){.mh-games{max-width:400px;gap:12px}.mh-card{padding:16px 10px;border-radius:16px}.mh-card-icon{width:44px;height:44px}.mh-card-name{font-size:13px}.mh-card-desc{font-size:10px}.ach-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:520px){.mh-title{font-size:28px}.tile{font-size:11px;height:64px;padding:4px 3px}.game-btn{padding:10px 18px;font-size:14px}.go-btn{padding:12px 32px;font-size:15px;min-width:200px}.ach-grid{grid-template-columns:repeat(3,1fr);gap:8px}}
@media(max-width:380px){.tile{font-size:10px;height:58px}.tile-grid{gap:6px}.mh-games{gap:8px}.mh-card{padding:12px 8px;border-radius:14px}.mh-card-icon{width:38px;height:38px;margin-bottom:8px}.mh-card-name{font-size:12px}.mh-card-desc{display:none}.ach-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
