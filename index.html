  mkt:[
    {q:'Which has HIGHER expected returns over the long term?',a:'Equities (stocks)',b:'Government bonds',correct:'a',explain:'Equities carry higher risk (volatility, no guaranteed returns) and historically deliver higher long-term returns. The difference is called the Equity Risk Premium (typically 5-7%).'},
    {q:'The Equity Risk Premium (ERP) typically ranges from:',a:'5% to 7%',b:'1% to 2%',correct:'a',explain:'The ERP represents the excess return investors demand for holding stocks over risk-free government bonds. It typically ranges from 5-7% historically.'},
    {q:'Which type of stock has a HIGHER claim on assets in liquidation?',a:'Preferred stock',b:'Common stock',correct:'a',explain:'Preferred stock is senior to common stock in the capital structure. In liquidation, preferred shareholders are paid before common shareholders (but after all debt holders).'},
    {q:'A company\'s stock beta of 1.5 means it is _____ than the overall market.',a:'More volatile (50% more)',b:'Less volatile',correct:'a',explain:'Beta measures systematic risk relative to the market (beta = 1.0). A beta of 1.5 means the stock moves 50% more than the market — if the market rises 10%, the stock is expected to rise 15%.'},
    {q:'When interest rates RISE, what happens to existing bond prices?',a:'They decrease',b:'They increase',correct:'a',explain:'Bond prices and interest rates move inversely. When new bonds offer higher rates, existing bonds with lower rates become less attractive, so their price drops.'},
    {q:'Which option gives the holder the right to BUY a stock?',a:'Call option',b:'Put option',correct:'a',explain:'A call option gives the holder the right (not obligation) to buy the underlying asset at a specified strike price. A put option gives the right to sell.'},
    {q:'A company issuing NEW shares in an offering will _____ existing shareholders\' ownership.',a:'Dilute (reduce)',b:'Increase',correct:'a',explain:'New shares increase the total share count. Existing shareholders now own a smaller percentage of the company, which is called dilution.'},
    {q:'The yield curve TYPICALLY slopes:',a:'Upward (longer maturity = higher yield)',b:'Downward (longer maturity = lower yield)',correct:'a',explain:'Investors demand higher yields for longer maturities due to greater uncertainty and inflation risk over time. An inverted (downward) curve often signals recession.'},
    {q:'Which SEC filing reports UNSCHEDULED material events?',a:'8-K',b:'10-Q',correct:'a',explain:'An 8-K is filed for unscheduled material events (acquisitions, executive changes, bankruptcy). The 10-Q is a routine quarterly financial report.'},
    {q:'Higher implied volatility means option premiums are:',a:'More expensive',b:'Cheaper',correct:'a',explain:'Higher implied volatility means greater expected price movement, increasing the probability the option ends in-the-money. This makes options more expensive.'},
    {q:'Are equity returns typically higher or lower than bond returns over long periods?',a:'Higher',b:'Lower',correct:'a',explain:'Equities have higher risk and higher expected returns (6-8% annually) compared to bonds (2-4% annually).'},
    {q:'Does the equity risk premium (ERP) expand or contract during market downturns?',a:'Expand',b:'Contract',correct:'a',explain:'During market stress, investors demand higher ERP to compensate for increased equity risk; spreads widen.'},
    {q:'When the Fed raises interest rates, does the risk-free rate increase or decrease?',a:'Increase',b:'Decrease',correct:'a',explain:'Fed rate hikes push up short-term and long-term government bond yields, raising the risk-free rate.'},
    {q:'Does inverse correlation between stocks and bonds strengthen during crisis periods?',a:'Yes',b:'No',correct:'a',explain:'Stocks and bonds typically move together during crises; negative correlation may break down, reducing diversification.'},
    {q:'In a normal yield curve, are long-term rates higher or lower than short-term rates?',a:'Higher',b:'Lower',correct:'a',explain:'Normal upward-sloping curves have higher long-term yields to compensate for duration risk and inflation expectations.'},
    {q:'Does a call option give the holder the right to buy or sell the underlying stock?',a:'Buy',b:'Sell',correct:'a',explain:'A call option is the right (not obligation) to buy at the strike price; a put is the right to sell.'},
    {q:'Does increasing stock price volatility increase or decrease option premiums?',a:'Increase',b:'Decrease',correct:'a',explain:'Higher implied volatility increases option value; both calls and puts become more expensive as uncertainty rises.'},
    {q:'Are warrants typically issued with bonds or equity?',a:'Bonds',b:'Equity',correct:'a',explain:'Warrants are often attached to bonds as sweeteners to reduce coupon rates; they\'re detachable and trade separately.'},
    {q:'When comparing preferred vs. common stock, which has priority in liquidation?',a:'Preferred',b:'Common',correct:'a',explain:'Preferred stock has liquidation priority over common; preferred holders get paid before common shareholders.'},
    {q:'Does a stock split increase or decrease the number of shares outstanding?',a:'Increase',b:'Decrease',correct:'a',explain:'A stock split divides each share into multiple shares (e.g., 2-for-1); shares increase but EPS is reduced proportionally.'},
    {q:'In options pricing (Black-Scholes), does an increase in risk-free rate increase or decrease call value?',a:'Increase',b:'Decrease',correct:'a',explain:'Higher risk-free rates increase the present value discount of the strike, making calls more valuable.'},
    {q:'Does implied volatility on options increase during bull or bear markets?',a:'Bull markets',b:'Bear markets',correct:'b',explain:'Implied volatility rises during sell-offs as investors fear further declines; it\'s elevated during crisis periods.'},
    {q:'When the yield curve inverts (long rates < short rates), is this a recession signal?',a:'Yes',b:'No',correct:'a',explain:'Inverted yield curves historically signal recession within 12-24 months; they reflect expectations of future rate cuts.'},
    {q:'Does a company\'s beta measure systematic or unsystematic risk?',a:'Systematic',b:'Unsystematic',correct:'a',explain:'Beta measures systematic (market) risk; unsystematic risk is firm-specific and diversifiable.'},
    {q:'In dividend yield, is it the annual dividend divided by stock price or earnings?',a:'Stock price',b:'Earnings',correct:'a',explain:'Dividend yield = Annual Dividend / Stock Price; it\'s a percentage return from dividends alone.'},
    {q:'Does a high-yield bond have investment-grade or speculative credit rating?',a:'Investment-grade',b:'Speculative',correct:'b',explain:'High-yield (junk) bonds have ratings below BBB- (Moody\'s Ba1); they carry significant default risk.'},
    {q:'When Fed policy turns dovish, do stock valuations typically expand or contract?',a:'Expand',b:'Contract',correct:'a',explain:'Dovish policy (lower rates) reduces discount rates and increases PE multiples; stocks typically rise.'},
    {q:'Does a put option holder profit when stock price rises or falls?',a:'Rises',b:'Falls',correct:'b',explain:'A put gives the right to sell at a strike; profits when stock price falls below the strike.'},
    {q:'Are market indices weighted by price or market capitalization?',a:'Price',b:'Market capitalization',correct:'b',explain:'Most indices (S&P 500, NASDAQ) use market-cap weighting; price-weighted indices (Dow) are less common.'},
    {q:'Does correlation between asset classes increase or decrease during bull markets?',a:'Increase',b:'Decrease',correct:'b',explain:'Bull markets see lower correlation; diversification works best when investor sentiment is strong.'},
    {q:'When spreads (high-yield - Treasury) narrow, does this indicate risk appetite increasing or decreasing?',a:'Increasing',b:'Decreasing',correct:'a',explain:'Narrow spreads suggest investors are accepting lower premiums for risk; risk appetite is strong.'},
    {q:'Does the Sharpe ratio measure excess return per unit of systematic or total risk?',a:'Systematic',b:'Total',correct:'b',explain:'Sharpe ratio = (Return - Risk-free) / Volatility; it measures return per unit of total (standard deviation) risk.'},
    {q:'In a bear market, do short sellers profit or lose money?',a:'Profit',b:'Lose',correct:'a',explain:'Short sellers profit when stock prices fall; they sell borrowed shares and repurchase at lower prices.'},
    {q:'Does the CBOE VIX measure implied volatility of S&P 500 options?',a:'Yes',b:'No',correct:'a',explain:'The VIX is the volatility index derived from S&P 500 index options; it\'s often called the "fear index."'},
    {q:'When Fed raises rates, do short-duration or long-duration bonds outperform?',a:'Short-duration',b:'Long-duration',correct:'a',explain:'Rising rates hurt bonds more if longer duration; short-duration bonds decline less in value.'},
    {q:'Does a bond with positive convexity gain more when rates fall or lose less when rates rise?',a:'Gain more',b:'Lose less',correct:'b',explain:'Positive convexity means price increases accelerate when rates fall and decelerate when rising; less downside.'},
    {q:'Are initial public offerings (IPOs) typically priced above or below fundamental value?',a:'Above',b:'Below',correct:'b',explain:'IPOs often underprice to ensure oversubscription; they typically rise after listing as demand overwhelms supply.'},
    {q:'Does a zero-coupon bond have higher or lower duration than a coupon-paying bond?',a:'Higher',b:'Lower',correct:'a',explain:'Zero-coupon bonds have duration equal to maturity; coupon bonds have lower duration due to interim cash flows.'},
    {q:'When the credit spread widens, does this reflect increasing or decreasing credit risk?',a:'Increasing',b:'Decreasing',correct:'a',explain:'Wider spreads (corporate bond yield - Treasury) indicate market sees higher default risk or risk aversion.'},

function recordResult(tid, won, mistakes){
  var d=getData();
  if(!d.topics)d.topics={};if(!d.global)d.global={totalWins:0,totalPerfects:0,winStreak:0,perfectStreak:0,earnedAch:[]};
  if(!d.topics[tid])d.topics[tid]={attempts:0,wins:0,perfects:0,bestMistakes:99,played:false};
  var t=d.topics[tid];var g=d.global;
  t.attempts++;t.played=true;
  if(won){
    t.wins++;g.totalWins++;g.winStreak++;
    if(mistakes<t.bestMistakes)t.bestMistakes=mistakes;
    if(mistakes===0){t.perfects++;g.totalPerfects++;g.perfectStreak++;}
    else{g.perfectStreak=0;}
  }else{g.winStreak=0;g.perfectStreak=0;}
  // Check Connections achievements
  if(!g.earnedAch)g.earnedAch=[];
  var ea=g.earnedAch;
  function grant(id){if(ea.indexOf(id)<0)ea.push(id);}
  if(won){
    grant('conn_first');
    if(mistakes===0)grant('conn_perfect');
    if(g.totalWins>=10)grant('conn_ten');
    var connTopics=['fs','val','ma','lbo','acct','cf','rx','ind'];
    var allConn=true;
    for(var i=0;i<connTopics.length;i++){if(!d.topics[connTopics[i]]||d.topics[connTopics[i]].wins<1){allConn=false;break;}}
    if(allConn)grant('conn_all');
  }
  saveData(d);
}
function checkCrossAchievements(){
  var d=getData();if(!d.global)d.global={totalWins:0,totalPerfects:0,winStreak:0,perfectStreak:0,earnedAch:[]};
  if(!d.global.earnedAch)d.global.earnedAch=[];
  var ea=d.global.earnedAch;
  function grant(id){if(ea.indexOf(id)<0)ea.push(id);}
  var cd=getCrossData();var totalAttempts=0;var hasPerfect=false;
  var crossTopicIds=['fs','val','ma','lbo','acct','cf','rx'];
  var allWon=true;
  for(var i=0;i<crossTopicIds.length;i++){
    var td=cd[crossTopicIds[i]];
    if(td){totalAttempts+=td.attempts;if(td.bestScore===100)hasPerfect=true;if(td.wins<1)allWon=false;}
    else{allWon=false;}
  }
  if(totalAttempts>0)grant('cross_first');
  if(hasPerfect)grant('cross_perfect');
  if(totalAttempts>=10)grant('cross_ten');
  if(allWon)grant('cross_all');
  saveData(d);
}

var topicSeeds={};var topicPlayed={};
function hashSeed(s){var h=0;for(var i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h=h&h;}return Math.abs(h);}
function seededRandom(seed){var s=hashSeed(String(seed));return function(){s=(s*16807)%2147483647;return(s-1)/2147483646;};}
function generatePuzzle(tid){
  var topic=TOPICS.find(function(t){return t.id===tid;});if(!topic)return null;
  var seed=topicSeeds[tid]||(Date.now()+tid);topicSeeds[tid]=seed;
  var rng=seededRandom(seed);
  var maxAttempts=50;
  for(var attempt=0;attempt<maxAttempts;attempt++){
    var groups=[];var allWords={};var hasDup=false;
    for(var d=0;d<4;d++){
      var bank=topic.banks[d];var idx=Math.floor(rng()*bank.length);
      var grp=bank[idx];
      for(var w=0;w<grp.words.length;w++){
        if(allWords[grp.words[w]]){hasDup=true;break;}
        allWords[grp.words[w]]=true;
      }
      if(hasDup)break;
      groups.push({name:grp.name,words:grp.words.slice(),difficulty:d});
    }
    if(!hasDup&&groups.length===4){
      return{topicId:tid,title:topic.name,groups:groups};
    }
  }
  // Fallback: use first group from each bank
  var groups=[];
  for(var d2=0;d2<4;d2++){var bank2=topic.banks[d2];groups.push({name:bank2[0].name,words:bank2[0].words.slice(),difficulty:d2});}
  return{topicId:tid,title:topic.name,groups:groups};
}
function refreshTopic(tid){topicSeeds[tid]=Date.now()+Math.floor(Math.random()*100000);topicPlayed[tid]=false;renderConnHome();}
TOPICS.forEach(function(t){topicSeeds[t.id]=Date.now()+hashSeed(t.id);});

function playTopic(tid){
  currentPuzzle=generatePuzzle(tid);if(!currentPuzzle)return;
  selectedWords=[];solvedGroups=[];mistakesLeft=4;previousGuesses=[];gameOver=false;
  remainingWords=[];currentPuzzle.groups.forEach(function(g){g.words.forEach(function(w){remainingWords.push(w);});});
  shuffleArray(remainingWords);
  showPage('game-page');
  document.getElementById('game-title').textContent=currentPuzzle.title;
  document.getElementById('game-instructions').textContent='Create four groups of four!';
  document.getElementById('mistakes-area').style.display='';
  document.getElementById('btn-row').style.display='';
  document.getElementById('conn-end-area').style.display='none';
  renderGame();
}
function viewAnswers(){
  document.getElementById('game-over').classList.remove('active');
  document.getElementById('mistakes-area').style.display='none';
  document.getElementById('btn-row').style.display='none';
  document.getElementById('tile-grid').innerHTML='';
  document.getElementById('game-instructions').textContent='Answers';
}
function renderGame(){renderSolved();renderGrid();renderMistakes();updateButtons();}
function renderSolved(){
  document.getElementById('solved-area').innerHTML=solvedGroups.map(function(g){
    return '<div class="solved-group '+DIFF[g.difficulty]+'"><div class="solved-group-name">'+g.name+'</div><div class="solved-group-words">'+g.words.join(', ')+'</div></div>';
  }).join('');
}
function renderGrid(){
  var grid=document.getElementById('tile-grid');
  grid.innerHTML=remainingWords.map(function(w){
    return '<div class="tile'+(selectedWords.indexOf(w)>=0?' selected':'')+'" onclick="toggleWord(this)" data-word="'+htmlEsc(w)+'">'+w+'</div>';
  }).join('');
  grid.querySelectorAll('.tile').forEach(function(t){var l=t.textContent.length;if(l>30)t.style.fontSize='8px';else if(l>20)t.style.fontSize='9px';else if(l>14)t.style.fontSize='10px';else if(l>10)t.style.fontSize='11px';});
}
function htmlEsc(s){return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function renderMistakes(){
  var d=document.getElementById('mistakes-dots');d.innerHTML='';
  for(var i=0;i<4;i++){var dot=document.createElement('div');dot.className='mistake-dot'+(i>=mistakesLeft?' used':'');d.appendChild(dot);}
}
function updateButtons(){
  document.getElementById('deselect-btn').disabled=selectedWords.length===0;
  document.getElementById('submit-btn').disabled=selectedWords.length!==4;
}
function toggleWord(el){
  if(gameOver)return;var w=el.getAttribute('data-word');var idx=selectedWords.indexOf(w);
  if(idx>=0)selectedWords.splice(idx,1);else{if(selectedWords.length>=4)return;selectedWords.push(w);}
  renderGrid();updateButtons();
}
function deselectAll(){selectedWords=[];renderGrid();updateButtons();}
function shuffleTiles(){shuffleArray(remainingWords);renderGrid();}
function submitGuess(){
  if(selectedWords.length!==4||gameOver)return;
  var key=selectedWords.slice().sort().join('|');if(previousGuesses.indexOf(key)>=0)return;previousGuesses.push(key);
  var matched=null;
  for(var i=0;i<currentPuzzle.groups.length;i++){
    var g=currentPuzzle.groups[i];if(solvedGroups.indexOf(g)>=0)continue;
    var m=0;for(var j=0;j<selectedWords.length;j++){if(g.words.indexOf(selectedWords[j])>=0)m++;}
    if(m===4){matched=g;break;}
  }
  if(matched){
    var tiles=document.querySelectorAll('.tile');var selT=[];
    tiles.forEach(function(t){if(selectedWords.indexOf(t.getAttribute('data-word'))>=0)selT.push(t);});
    selT.forEach(function(t,i){setTimeout(function(){t.classList.add('bounce');},i*80);});
    var mg=matched;
    setTimeout(function(){
      solvedGroups.push(mg);remainingWords=remainingWords.filter(function(w){return mg.words.indexOf(w)<0;});selectedWords=[];renderGame();
      if(solvedGroups.length===4){gameOver=true;setTimeout(function(){finishGame(true);},500);}
    },500);
  }else{
    var oneAway=false;
    for(var i2=0;i2<currentPuzzle.groups.length;i2++){
      var g2=currentPuzzle.groups[i2];if(solvedGroups.indexOf(g2)>=0)continue;
      var m2=0;for(var j2=0;j2<selectedWords.length;j2++){if(g2.words.indexOf(selectedWords[j2])>=0)m2++;}
      if(m2===3){oneAway=true;break;}
    }
    document.querySelectorAll('.tile').forEach(function(t){
      if(selectedWords.indexOf(t.getAttribute('data-word'))>=0){t.classList.add('shake');setTimeout(function(){t.classList.remove('shake');},500);}
    });
    if(oneAway)showToast('One away...');
    mistakesLeft--;renderMistakes();
    if(mistakesLeft<=0){
      gameOver=true;
      setTimeout(function(){
        currentPuzzle.groups.forEach(function(g){if(solvedGroups.indexOf(g)<0)solvedGroups.push(g);});
        remainingWords=[];selectedWords=[];renderGame();
        setTimeout(function(){finishGame(false);},600);
      },800);
    }else{selectedWords=[];setTimeout(function(){renderGrid();updateButtons();},500);}
  }
}

function finishGame(won){
  var mu=4-mistakesLeft;
  topicPlayed[currentPuzzle.topicId]=true;
  recordResult(currentPuzzle.topicId,won,mu);
  showGameOver(won,mu);
}

// ══ HIGHER OR LOWER GAME ══
var hlCurrentTopic='';
var hlQuestions=[];
var hlRoundIdx=0;
var hlRoundScores=[];
var hlAnswered=false;
var hlUserChoices=[];
var hlTopicPlayed={};
var hlTopicSeeds={};

function getHlData(){try{return JSON.parse(localStorage.getItem('ib-hl-data')||'{}');}catch(e){return {};}}
function saveHlData(d){localStorage.setItem('ib-hl-data',JSON.stringify(d));}
function getHlTopicData(tid){var d=getHlData();if(!d[tid])d[tid]={attempts:0,wins:0,bestScore:0};return d[tid];}
function refreshHlTopic(tid){hlTopicSeeds[tid]=Date.now()+Math.random();hlTopicPlayed[tid]=false;}

function showHlHome(){showPage('hl-home');renderHlHome();}
function backToHlHome(){document.getElementById('hl-game-over').classList.remove('active');showHlHome();}

function renderHlHome(){
  var list=document.getElementById('hl-topic-list');
  list.innerHTML=HL_TOPICS.map(function(t){
    var td=getHlTopicData(t.id);
    var played=hlTopicPlayed[t.id]||false;
    var medalType='none';
    if(td.bestScore===6)medalType='gold';else if(td.bestScore>=5)medalType='silver';else if(td.bestScore>=4)medalType='bronze';
    var statsText=td.attempts>0?td.wins+' won, '+td.attempts+' played':'Not yet played';
    var iconHTML='<div class="topic-icon">'+topicIconSVG(t.id)+'</div>';
    return '<div class="topic-card">'+
      '<div class="topic-card-left" onclick="startHlGame(\''+t.id+'\')">'+
        iconHTML+
        '<div class="topic-card-info">'+
          '<div class="topic-card-name">'+t.name+'</div>'+
          '<div class="topic-card-stats">'+statsText+'</div>'+
        '</div>'+
      '</div>'+
      '<div class="topic-card-right">'+
        '<button class="topic-play" onclick="startHlGame(\''+t.id+'\')">Play</button>'+
      '</div>'+
    '</div>';
  }).join('');
}

function startHlGame(tid){
  hlCurrentTopic=tid;
  var bank=HL_BANKS[tid];if(!bank||bank.length===0)return;
  var seed=hlTopicSeeds[tid]||(Date.now()+tid);hlTopicSeeds[tid]=seed;
  var rng=seededRandom(seed);
  var pool=bank.slice();
  for(var i=pool.length-1;i>0;i--){var j=Math.floor(rng()*(i+1));var tmp=pool[i];pool[i]=pool[j];pool[j]=tmp;}
  hlQuestions=pool.slice(0,6);
  hlRoundIdx=0;hlRoundScores=[];hlUserChoices=[];
  var topicName=HL_TOPICS.find(function(t){return t.id===tid;});
  showPage('hl-game');
  document.getElementById('hl-game-title').textContent=topicName?topicName.name:'This or That';
  startHlRound();
}

function startHlRound(){
  hlAnswered=false;
  var q=hlQuestions[hlRoundIdx];
  document.getElementById('hl-round-info').textContent='Question '+(hlRoundIdx+1)+' of '+hlQuestions.length;
  document.getElementById('hl-question').textContent=q.q;
  document.getElementById('hl-feedback').textContent='';
  document.getElementById('hl-feedback').className='int-feedback';
  document.getElementById('hl-explain').textContent='';
  document.getElementById('hl-explain').style.display='none';
  document.getElementById('hl-next-area').innerHTML='';

  var swapped=Math.random()<0.5;
  var leftChoice=swapped?'b':'a';
  var rightChoice=swapped?'a':'b';
  var leftText=swapped?q.b:q.a;
  var rightText=swapped?q.a:q.b;

  document.getElementById('hl-cards').innerHTML=
    '<div class="hl-card" onclick="hlSelect(\''+leftChoice+'\')" id="hl-card-left">'+
      '<div class="hl-card-text">'+leftText+'</div>'+
    '</div>'+
    '<div class="hl-card" onclick="hlSelect(\''+rightChoice+'\')" id="hl-card-right">'+
      '<div class="hl-card-text">'+rightText+'</div>'+
    '</div>';

  renderHlScoreDots();
}

function renderHlScoreDots(){
  var area=document.getElementById('hl-score-area');
  var dots='';
  for(var i=0;i<hlQuestions.length;i++){
    var cls='int-round-dot';var txt=''+(i+1);
    if(i<hlRoundScores.length){
      var s=hlRoundScores[i];
      if(s===1)cls+=' pts3';else cls+=' pts0';
      txt=s===1?'✓':'✗';
    }else if(i===hlRoundIdx){cls+=' current';}
    dots+='<div class="'+cls+'">'+txt+'</div>';
  }
  area.innerHTML='<div class="int-round-dots">'+dots+'</div>';
}

function hlSelect(choice){
  if(hlAnswered)return;
  hlAnswered=true;
  var q=hlQuestions[hlRoundIdx];
  var isCorrect=choice===q.correct;
  hlRoundScores.push(isCorrect?1:0);
  hlUserChoices.push(choice);

  var fb=document.getElementById('hl-feedback');
  if(isCorrect){
    fb.textContent='Correct!';
    fb.className='int-feedback correct-fb';
  }else{
    fb.textContent='Incorrect';
    fb.className='int-feedback wrong-fb';
  }

  var cards=document.querySelectorAll('.hl-card');
  cards[0].style.pointerEvents='none';
  cards[1].style.pointerEvents='none';

  var leftChoice=cards[0].getAttribute('onclick').match(/hlSelect\('([ab])'\)/)[1];
  var rightChoice=cards[1].getAttribute('onclick').match(/hlSelect\('([ab])'\)/)[1];

  if(leftChoice===q.correct){cards[0].classList.add('correct');if(!isCorrect)cards[1].classList.add('wrong');}
  else{cards[1].classList.add('correct');if(!isCorrect)cards[0].classList.add('wrong');}

  var explainDiv=document.getElementById('hl-explain');
  explainDiv.textContent=q.explain;
  explainDiv.style.display='block';

  renderHlScoreDots();

  var area=document.getElementById('hl-next-area');
  if(hlRoundIdx<hlQuestions.length-1){
    area.innerHTML='<button class="int-next-btn" onclick="hlNextRound()">Next Question</button>';
  }else{
    area.innerHTML='<button class="int-next-btn" onclick="hlFinishGame()">See Results</button>';
  }
}

function hlNextRound(){
  hlRoundIdx++;
  startHlRound();
}

function hlFinishGame(){
  var total=0;for(var i=0;i<hlRoundScores.length;i++)total+=hlRoundScores[i];
  var max=6;
  var pct=Math.round((total/max)*100);
  var title=pct>=90?'Excellent!':pct>=70?'Well done!':pct>=50?'Not bad!':'Keep practicing!';
  var dots=hlRoundScores.map(function(s){
    var cls='int-round-dot';
    if(s===1)cls+=' pts3';else cls+=' pts0';
    return '<div class="'+cls+'" style="width:36px;height:36px;font-size:12px">'+(s===1?'✓':'✗')+'</div>';
  }).join('');

  hlTopicPlayed[hlCurrentTopic]=true;
  var d=getHlData();
  if(!d[hlCurrentTopic])d[hlCurrentTopic]={attempts:0,wins:0,bestScore:0};
  d[hlCurrentTopic].attempts++;
  if(total>=4)d[hlCurrentTopic].wins++;
  if(total>d[hlCurrentTopic].bestScore)d[hlCurrentTopic].bestScore=total;
  saveHlData(d);
  checkHlAchievements();

  var box=document.getElementById('hl-go-box');
  box.innerHTML=
    '<div class="go-title">'+title+'</div>'+
    '<div class="int-go-score">'+total+'/'+max+'</div>'+
    '<div class="int-go-breakdown">'+dots+'</div>'+
    '<div class="go-sub">'+pct+'% correct</div>'+
    '<div class="go-btns">'+
      '<button class="go-btn" onclick="document.getElementById(\'hl-game-over\').classList.remove(\'active\');refreshHlTopic(\''+hlCurrentTopic+'\');startHlGame(\''+hlCurrentTopic+'\')">New Puzzle</button>'+
      '<button class="go-btn outline" onclick="hlShowReview()">Review Answers</button>'+
      '<button class="go-btn outline" onclick="backToHlHome()">Back to Topics</button>'+
    '</div>';
  document.getElementById('hl-game-over').classList.add('active');
}

var hlReviewIdx=0;

function hlShowReview(){
  hlReviewIdx=0;
  var box=document.getElementById('hl-go-box');
  var dots='';for(var i=0;i<hlQuestions.length;i++){dots+='<div class="hl-review-dot'+(i===0?' active':'')+'"></div>';}
  box.innerHTML=
    '<div class="go-title">Review Answers</div>'+
    '<div class="hl-review">'+
      '<div class="hl-review-counter" id="hl-rev-counter">Question 1 of '+hlQuestions.length+'</div>'+
      '<div class="hl-review-track" id="hl-rev-track"></div>'+
      '<div class="hl-review-nav">'+
        '<button class="hl-review-arrow" id="hl-rev-prev" onclick="hlReviewNav(-1)" disabled>&#8592;</button>'+
        '<div class="hl-review-dots" id="hl-rev-dots">'+dots+'</div>'+
        '<button class="hl-review-arrow" id="hl-rev-next" onclick="hlReviewNav(1)">&#8594;</button>'+
      '</div>'+
    '</div>'+
    '<div class="go-btns" style="margin-top:20px">'+
      '<button class="go-btn" onclick="document.getElementById(\'hl-game-over\').classList.remove(\'active\');refreshHlTopic(\''+hlCurrentTopic+'\');startHlGame(\''+hlCurrentTopic+'\')">New Puzzle</button>'+
      '<button class="go-btn outline" onclick="backToHlHome()">Back to Topics</button>'+
    '</div>';
  hlRenderReviewCard();
  hlInitReviewSwipe();
}

function hlRenderReviewCard(){
  var q=hlQuestions[hlReviewIdx];
  var userChoice=hlUserChoices[hlReviewIdx];
  var isCorrect=hlRoundScores[hlReviewIdx]===1;
  var correctAnswer=q.correct==='a'?q.a:q.b;
  var userAnswer=userChoice==='a'?q.a:q.b;
  var track=document.getElementById('hl-rev-track');
  track.innerHTML=
    '<div class="hl-review-card '+(isCorrect?'correct-card':'wrong-card')+'">'+
      '<div class="hl-review-q">'+q.q+'</div>'+
      '<div class="hl-review-badge '+(isCorrect?'correct-badge':'wrong-badge')+'">'+(isCorrect?'✓ Correct':'✗ Incorrect')+'</div>'+
      '<div class="hl-review-pick">Your answer: <strong>'+userAnswer+'</strong></div>'+
      (!isCorrect?'<div class="hl-review-answer">Correct answer: '+correctAnswer+'</div>':'')+
      '<div class="hl-review-explain">'+q.explain+'</div>'+
    '</div>';
  document.getElementById('hl-rev-counter').textContent='Question '+(hlReviewIdx+1)+' of '+hlQuestions.length;
  document.getElementById('hl-rev-prev').disabled=hlReviewIdx===0;
  document.getElementById('hl-rev-next').disabled=hlReviewIdx===hlQuestions.length-1;
  var dots=document.querySelectorAll('#hl-rev-dots .hl-review-dot');
  for(var i=0;i<dots.length;i++){dots[i].classList.toggle('active',i===hlReviewIdx);}
}

function hlReviewNav(dir){
  var next=hlReviewIdx+dir;
  if(next<0||next>=hlQuestions.length)return;
  hlReviewIdx=next;
  hlRenderReviewCard();
}

function hlInitReviewSwipe(){
  var track=document.getElementById('hl-rev-track');
  if(!track)return;
  var startX=0;var startY=0;var swiping=false;
  track.addEventListener('touchstart',function(e){
    startX=e.touches[0].clientX;
    startY=e.touches[0].clientY;
    swiping=true;
  },{passive:true});
  track.addEventListener('touchend',function(e){
    if(!swiping)return;
    swiping=false;
    var dx=e.changedTouches[0].clientX-startX;
    var dy=e.changedTouches[0].clientY-startY;
    if(Math.abs(dx)>40&&Math.abs(dx)>Math.abs(dy)){
      if(dx<0)hlReviewNav(1);
      else hlReviewNav(-1);
    }
  },{passive:true});
}

function checkHlAchievements(){
  var d=getData();
  if(!d.global)d.global={totalWins:0,totalPerfects:0,winStreak:0,perfectStreak:0,earnedAch:[]};
  var g=d.global;var earned=g.earnedAch||[];var changed=false;
  var hd=getHlData();
  var totalAttempts=0;var totalWins=0;var allTopicsWon=true;
  for(var i=0;i<HL_TOPICS.length;i++){
    var td=hd[HL_TOPICS[i].id];
    if(td){totalAttempts+=td.attempts;totalWins+=td.wins;if(td.wins<1)allTopicsWon=false;}
    else allTopicsWon=false;
  }
  if(totalAttempts>=1&&earned.indexOf('hl_first')<0){earned.push('hl_first');changed=true;}
  var anyPerfect=false;for(var k in hd){if(hd[k].bestScore===6)anyPerfect=true;}
  if(anyPerfect&&earned.indexOf('hl_perfect')<0){earned.push('hl_perfect');changed=true;}
  if(totalAttempts>=10&&earned.indexOf('hl_ten')<0){earned.push('hl_ten');changed=true;}
  if(allTopicsWon&&earned.indexOf('hl_all')<0){earned.push('hl_all');changed=true;}
  if(changed){g.earnedAch=earned;saveData(d);renderAchievements();}
}

// ══ CROSSWORD UTILITIES ══
function calcCrossNumbers(puzzle){
  var nums={};
  var num=1;
  for(var r=0;r<puzzle.size;r++){
    for(var c=0;c<puzzle.grid[r].length;c++){
      if(puzzle.grid[r][c]==='#')continue;
      var startsAcross=(c===0||puzzle.grid[r][c-1]==='#')&&c+1<puzzle.grid[r].length&&puzzle.grid[r][c+1]!=='#';
      var startsDown=(r===0||puzzle.grid[r-1][c]==='#')&&r+1<puzzle.grid.length&&puzzle.grid[r+1][c]!=='#';
      if(startsAcross||startsDown){
        nums[r+','+c]=num;
        num++;
      }
    }
  }
  return nums;
}

function hasWordInDirection(r,c,dir,puzzle){
  if(puzzle.grid[r][c]==='#')return false;
  if(dir==='across'){
    var count=0;
    for(var j=c;j>=0&&puzzle.grid[r][j]!=='#';j--){count++;}
    for(var j2=c+1;j2<puzzle.grid[r].length&&puzzle.grid[r][j2]!=='#';j2++){count++;}
    return count>=2;
  }else{
    var count=0;
    for(var i=r;i>=0&&puzzle.grid[i][c]!=='#';i--){count++;}
    for(var i2=r+1;i2<puzzle.grid.length&&puzzle.grid[i2][c]!=='#';i2++){count++;}
    return count>=2;
  }
}

function getWordStartCell(r,c,dir,puzzle){
  if(dir==='across'){
    while(c>0&&puzzle.grid[r][c-1]!=='#'){c--;}
  }else{
    while(r>0&&puzzle.grid[r-1][c]!=='#'){r--;}
  }
  return[r,c];
}

function showCrossHome(){showPage('cross-home');renderCrossHome();}
function backToCrossHome(){document.getElementById('cross-game-over').classList.remove('active');showCrossHome();}

function renderCrossHome(){
  var list=document.getElementById('cross-topic-list');
  var crossTopicIds=['fs','val','ma','lbo','acct','cf','rx'];
  var topics=TOPICS.filter(function(t){return crossTopicIds.indexOf(t.id)>=0;});
  list.innerHTML=topics.map(function(t){
    var td=getCrossTopicData(t.id);
    var medalType='none';
    if(td.bestScore===100)medalType='gold';else if(td.bestScore>=80)medalType='silver';else if(td.bestScore>=60)medalType='bronze';
    var statsText=td.attempts>0?td.wins+' won, '+td.attempts+' played':'Not yet played';
    var iconHTML='<div class="topic-icon">'+topicIconSVG(t.id)+'</div>';
    return '<div class="topic-card">'+
      '<div class="topic-card-left" onclick="startCrossGame(\''+t.id+'\')">'+

function startCrossGame(tid){
  crossCurrentTopic=tid;
  var puzzles=CROSS_PUZZLES[tid];if(!puzzles||puzzles.length===0){alert('No puzzles for this topic');return;}
  var d=getCrossData();
  if(!d[tid])d[tid]={attempts:0,wins:0,bestScore:0,puzzleIdx:0};
  crossCurrentPuzzleIdx=d[tid].puzzleIdx||0;
  if(crossCurrentPuzzleIdx>=puzzles.length)crossCurrentPuzzleIdx=0;
  crossCurrentPuzzle=JSON.parse(JSON.stringify(puzzles[crossCurrentPuzzleIdx]));
  crossCellNumbers=calcCrossNumbers(crossCurrentPuzzle);
  crossAnswers={};
  crossSelected=null;
  crossDirection='across';
  crossSolutionRevealed=false;
  crossChecked=false;
  crossCorrectCells={};
  crossWrongCells={};
  crossFirstSubmit=true;
  crossGrid=initCrossGrid(crossCurrentPuzzle);
  showPage('cross-game');
  document.getElementById('cross-game-title').textContent=TOPICS.find(function(t){return t.id===tid;}).name;
  // Restore buttons to initial state
  document.getElementById('cross-submit-area').innerHTML=
    '<button class="int-submit" id="cross-submit-btn" onclick="crossSubmit()">Submit</button>'+
    '<button class="int-submit" id="cross-show-sol-btn" onclick="crossRevealSolution()" style="display:none;margin-left:12px">Show Solution</button>';
  document.getElementById('cross-feedback').innerHTML='';
  renderCrossGrid();
  renderCrossClues();
}

function initCrossGrid(puzzle){
  var grid=[];
  for(var i=0;i<puzzle.size;i++){
    grid[i]=[];
    for(var j=0;j<puzzle.size;j++){
      var isBlack=puzzle.grid[i][j]==='#';
      grid[i][j]={black:isBlack,letter:isBlack?'#':puzzle.grid[i][j],entered:''};
    }
  }
  return grid;
}

function renderCrossGrid(){
  var html='';
  for(var i=0;i<crossGrid.length;i++){
    for(var j=0;j<crossGrid[i].length;j++){
      var cell=crossGrid[i][j];
      if(cell.black){
        html+='<div class="cross-cell black"></div>';
      }else{
        var num=crossCellNumbers[i+','+j]||'';
        var selected=crossSelected&&crossSelected[0]===i&&crossSelected[1]===j?'selected':'';
        var highlighted=isInCurrentWord(i,j)?'highlighted':'';
        var correct=crossChecked&&crossCorrectCells[i+','+j]?'correct':'';
        var wrong=crossChecked&&crossWrongCells[i+','+j]?'wrong':'';
        html+='<div class="cross-cell '+selected+' '+highlighted+' '+correct+' '+wrong+'" onclick="selectCrossCell('+i+','+j+')">';
        if(num){html+='<span class="cross-cell-num">'+num+'</span>';}
        if(cell.entered){html+='<div class="cross-cell-letter">'+cell.entered+'</div>';}
        html+='</div>';
      }
    }
  }
  document.getElementById('cross-grid').innerHTML=html;
  document.getElementById('cross-grid').style.gridTemplateColumns='repeat('+crossCurrentPuzzle.size+',56px)';
  updateClueHighlight();
}

function isInCurrentWord(r,c){
  if(!crossSelected)return false;
  if(crossGrid[r][c].black)return false;
  if(crossDirection==='across'){
    if(crossSelected[0]!==r)return false;
    var startCol=crossSelected[1];
    while(startCol>0&&!crossGrid[r][startCol-1].black){startCol--;}
    var endCol=crossSelected[1];
    while(endCol<crossCurrentPuzzle.size-1&&!crossGrid[r][endCol+1].black){endCol++;}
    return c>=startCol&&c<=endCol;
  }else{
    if(crossSelected[1]!==c)return false;
    var startRow=crossSelected[0];
    while(startRow>0&&!crossGrid[startRow-1][c].black){startRow--;}
    var endRow=crossSelected[0];
    while(endRow<crossCurrentPuzzle.size-1&&!crossGrid[endRow+1][c].black){endRow++;}
    return r>=startRow&&r<=endRow;
  }
}

function updateClueHighlight(){
  var clues=document.querySelectorAll('.cross-clue');
  clues.forEach(function(c){c.classList.remove('active');});
  if(!crossSelected)return;
  var r=crossSelected[0],col=crossSelected[1];
  var wordStart=getWordStartCell(r,col,crossDirection,crossCurrentPuzzle);
  var clueNum=crossCellNumbers[wordStart[0]+','+wordStart[1]];
  if(clueNum){
    var section=crossDirection==='across'?0:1;
    var cluesInSection=document.querySelectorAll('.cross-clues-section')[section].querySelectorAll('.cross-clue');
    cluesInSection.forEach(function(c){
      if(c.textContent.indexOf(clueNum+'X')===0)c.classList.add('active');
    });
  }
}

function selectCrossCell(r,c){
  if(crossGrid[r][c].black)return;
  if(crossSolutionRevealed)return;
  // Check if clicked cell is already in the current highlighted word
  var inCurrentWord=crossSelected&&isInCurrentWord(r,c);
  if(inCurrentWord){
    // Toggle direction at the clicked position
    var newDir=crossDirection==='across'?'down':'across';
    if(hasWordInDirection(r,c,newDir,crossCurrentPuzzle)){
      crossDirection=newDir;
      var start=getWordStartCell(r,c,newDir,crossCurrentPuzzle);
      crossSelected=start;
    }
  }else{
    // New cell outside current word - pick best direction and go to word start
    if(hasWordInDirection(r,c,'across',crossCurrentPuzzle)){
      crossDirection='across';
    }else if(hasWordInDirection(r,c,'down',crossCurrentPuzzle)){
      crossDirection='down';
    }
    var start=getWordStartCell(r,c,crossDirection,crossCurrentPuzzle);
    crossSelected=start;
  }
  renderCrossGrid();
}

function renderCrossClues(){
  var across=crossCurrentPuzzle.clues.across||[];
  var down=crossCurrentPuzzle.clues.down||[];
  var html='<div class="cross-clues-section"><div class="cross-clues-title">Across</div>';
  across.forEach(function(w){
    var num=crossCellNumbers[w.row+','+w.col]||w.num;
    html+='<div class="cross-clue" onclick="goToCrossWord('+w.row+','+w.col+',\'across\')"><span class="cross-clue-num">'+num+'.</span>'+w.clue+'</div>';
  });
  html+='</div><div class="cross-clues-section"><div class="cross-clues-title">Down</div>';
  down.forEach(function(w){
    var num=crossCellNumbers[w.row+','+w.col]||w.num;
    html+='<div class="cross-clue" onclick="goToCrossWord('+w.row+','+w.col+',\'down\')"><span class="cross-clue-num">'+num+'.</span>'+w.clue+'</div>';
  });
  html+='</div>';
  document.getElementById('cross-clues').innerHTML=html;
}

function goToCrossWord(r,c,dir){
  var start=getWordStartCell(r,c,dir,crossCurrentPuzzle);
  crossSelected=start;
  crossDirection=dir;
  renderCrossGrid();
}

// Get all cells in the current word (in order)
function getCurrentWordCells(){
  if(!crossSelected)return[];
  var r=crossSelected[0],c=crossSelected[1];
  var start=getWordStartCell(r,c,crossDirection,crossCurrentPuzzle);
  var cells=[];
  var sr=start[0],sc=start[1];
  if(crossDirection==='across'){
    for(var j=sc;j<crossGrid[sr].length&&!crossGrid[sr][j].black;j++){cells.push([sr,j]);}
  }else{
    for(var i=sr;i<crossGrid.length&&!crossGrid[i][sc].black;i++){cells.push([i,sc]);}
  }
  return cells;
}

function vkbPressCross(letter){
  if(!crossSelected||crossSolutionRevealed)return;
  var cells=getCurrentWordCells();
  if(cells.length===0)return;
  // Find the first empty cell in the word
  var target=null;
  for(var i=0;i<cells.length;i++){
    if(!crossGrid[cells[i][0]][cells[i][1]].entered){target=cells[i];break;}
  }
  if(!target)return;// word is full
  crossGrid[target[0]][target[1]].entered=letter.toUpperCase();
  // Move cursor to next empty cell, or stay at last filled
  var nextEmpty=null;
  for(var i=0;i<cells.length;i++){
    if(!crossGrid[cells[i][0]][cells[i][1]].entered){nextEmpty=cells[i];break;}
  }
  if(nextEmpty){crossSelected=nextEmpty;}else{crossSelected=target;}
  renderCrossGrid();
}

function vkbBackspaceCross(){
  if(!crossSelected||crossSolutionRevealed)return;
  var cells=getCurrentWordCells();
  if(cells.length===0)return;
  // Find the last filled cell in the word
  var target=null;
  for(var i=cells.length-1;i>=0;i--){
    if(crossGrid[cells[i][0]][cells[i][1]].entered){target=cells[i];break;}
  }
  if(!target)return;// word is empty, nothing to delete
  crossGrid[target[0]][target[1]].entered='';
  crossSelected=target;
  renderCrossGrid();
}

function crossSubmit(){
  var correct=0,total=0;
  for(var i=0;i<crossGrid.length;i++){
    for(var j=0;j<crossGrid[i].length;j++){
      if(!crossGrid[i][j].black){
        total++;
        if(crossGrid[i][j].entered===crossGrid[i][j].letter){correct++;}
      }
    }
  }
  var pct=Math.round((correct/total)*100);

  if(pct<100){
    var feedbackEl=document.getElementById('cross-feedback');
    feedbackEl.innerHTML='<div style="font-size:14px;color:#E53935">Not quite!</div>';
    var showSolBtn=document.getElementById('cross-show-sol-btn');
    if(showSolBtn)showSolBtn.style.display='inline-block';
    setTimeout(function(){
      feedbackEl.innerHTML='';
    },2000);
    return;
  }

  // Perfect score
  var d=getCrossData();
  if(!d[crossCurrentTopic])d[crossCurrentTopic]={attempts:0,wins:0,bestScore:0,puzzleIdx:0};
  d[crossCurrentTopic].attempts++;
  d[crossCurrentTopic].wins++;
  if(pct>d[crossCurrentTopic].bestScore)d[crossCurrentTopic].bestScore=pct;
  d[crossCurrentTopic].puzzleIdx=(crossCurrentPuzzleIdx+1)%CROSS_PUZZLES[crossCurrentTopic].length;
  saveCrossData(d);
  checkCrossAchievements();

  // Show perfect score inline (no popup)
  crossSolutionRevealed=true;
  crossSelected=null;
  crossCorrectCells={};
  for(var i=0;i<crossGrid.length;i++){
    for(var j=0;j<crossGrid[i].length;j++){
      if(!crossGrid[i][j].black) crossCorrectCells[i+','+j]=true;
    }
  }
  crossChecked=true;
  renderCrossGrid();

  var feedbackEl=document.getElementById('cross-feedback');
  feedbackEl.innerHTML='<div style="font-size:16px;font-weight:700;color:#4CAF50;margin-top:8px">Perfect! '+correct+'/'+total+' correct</div>';
  var submitArea=document.getElementById('cross-submit-area');
  submitArea.innerHTML=
    '<button class="int-submit" onclick="crossNewPuzzle()" style="background:#111;color:#fff">New Puzzle</button>'+
    '<button class="int-submit" onclick="backToCrossHome()" style="background:#fff;color:#111;border:1.5px solid #111;margin-left:8px">Back to Topics</button>';
}

function crossRevealSolution(){
  if(crossSolutionRevealed)return;
  crossSolutionRevealed=true;

  // Count correct words before revealing
  var correctWords=0,totalWords=0;
  var allClues=[].concat(crossCurrentPuzzle.clues.across||[]).concat(crossCurrentPuzzle.clues.down||[]);
  allClues.forEach(function(cl){
    totalWords++;
    var r=cl.row,c=cl.col;
    var isAcross=crossCurrentPuzzle.clues.across.indexOf(cl)>=0;
    var wordCorrect=true;
    if(isAcross){
      for(var j=c;j<crossCurrentPuzzle.size&&crossCurrentPuzzle.grid[r][j]!=='#';j++){
        if(crossGrid[r][j].entered!==crossGrid[r][j].letter) wordCorrect=false;
      }
    }else{
      for(var i=r;i<crossCurrentPuzzle.size&&crossCurrentPuzzle.grid[i][c]!=='#';i++){
        if(crossGrid[i][c].entered!==crossGrid[i][c].letter) wordCorrect=false;
      }
    }
    if(wordCorrect) correctWords++;
  });

  // Mark correct and wrong cells, then fill in the solution
  crossCorrectCells={};
  crossWrongCells={};
  for(var i=0;i<crossGrid.length;i++){
    for(var j=0;j<crossGrid[i].length;j++){
      if(!crossGrid[i][j].black){
        if(crossGrid[i][j].entered===crossGrid[i][j].letter){
          crossCorrectCells[i+','+j]=true;
        }else{
          crossWrongCells[i+','+j]=true;
        }
        crossGrid[i][j].entered=crossGrid[i][j].letter;
      }
    }
  }
  crossChecked=true;
  crossSelected=null;
  renderCrossGrid();

  // Save progress
  var d=getCrossData();
  if(!d[crossCurrentTopic])d[crossCurrentTopic]={attempts:0,wins:0,bestScore:0,puzzleIdx:0};
  d[crossCurrentTopic].attempts++;
  d[crossCurrentTopic].puzzleIdx=(crossCurrentPuzzleIdx+1)%CROSS_PUZZLES[crossCurrentTopic].length;
  saveCrossData(d);
  checkCrossAchievements();

  // Show score and New Puzzle button inline (no popup)
  var feedbackEl=document.getElementById('cross-feedback');
  feedbackEl.innerHTML='<div style="font-size:16px;font-weight:700;color:var(--text);margin-top:8px">You got '+correctWords+'/'+totalWords+' words correct</div>';
  var submitArea=document.getElementById('cross-submit-area');
  submitArea.innerHTML=
    '<button class="int-submit" onclick="crossNewPuzzle()" style="background:#111;color:#fff">New Puzzle</button>'+
    '<button class="int-submit" onclick="backToCrossHome()" style="background:#fff;color:#111;border:1.5px solid #111;margin-left:8px">Back to Topics</button>';
}

function crossNewPuzzle(){
  document.getElementById('cross-game-over').classList.remove('active');
  startCrossGame(crossCurrentTopic);
}

// ══ CROSSWORD KEYBOARD INPUT ══
document.addEventListener('keydown',function(e){
  var crossGameEl=document.getElementById('cross-game');
  if(!crossGameEl||!crossGameEl.classList.contains('active'))return;
  if(!crossSelected||crossSolutionRevealed)return;

  var letter=e.key.toUpperCase();
  if(/^[A-Z]$/.test(letter)){
    e.preventDefault();
    vkbPressCross(letter);
  }else if(e.key==='Backspace'){
    e.preventDefault();
    vkbBackspaceCross();
  }else if(e.key==='ArrowRight'||e.key==='ArrowLeft'||e.key==='ArrowDown'||e.key==='ArrowUp'){
    e.preventDefault();
    // Arrow keys move within the current word cells
    var cells=getCurrentWordCells();
    if(cells.length>0){
      var idx=-1;
      for(var i=0;i<cells.length;i++){if(cells[i][0]===crossSelected[0]&&cells[i][1]===crossSelected[1]){idx=i;break;}}
      if(e.key==='ArrowRight'||e.key==='ArrowDown'){if(idx<cells.length-1)crossSelected=cells[idx+1];}
      else{if(idx>0)crossSelected=cells[idx-1];}
    }
    renderCrossGrid();
  }else if(e.key==='Tab'){
    e.preventDefault();
  }
});

// Touch-friendly VKB: use event delegation with touchstart+click for instant mobile response
(function(){
  var vkb=document.getElementById('cross-vkb');
  if(!vkb)return;
  var handled=false;
  function handleKey(e){
    var btn=e.target.closest('.vkb-key');
    if(!btn)return;
    e.preventDefault();
    if(e.type==='touchstart'){handled=true;}
    else if(e.type==='click'&&handled){handled=false;return;}
    var key=btn.getAttribute('data-key');
    if(!key)return;
    if(key==='BACKSPACE'){vkbBackspaceCross();}
    else if(/^[A-Z]$/.test(key)){vkbPressCross(key);}
  }
  vkb.addEventListener('touchstart',handleKey,{passive:false});
  vkb.addEventListener('click',handleKey);
})();

renderAchievements();
</script>
